<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237C5CFF'/%3E%3Cpath d='M10 22V10h12v3h-9v2h7v3h-7v2h9v2H10z' fill='white'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Базовый CSP: ограничивает источники скриптов и подключений. На GitHub
         Pages нет HTTP-заголовков, поэтому используем meta — это слабее
         (clickjacking через X-Frame-Options не покрывается, нужен фронтинг
         через Cloudflare/Caddy для полной защиты), но JS-инъекции и
         exfiltration через произвольные домены отсекает.
         Поправь, если добавляешь новый внешний сервис (Stripe, Yandex Metrica и т.п.). -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://stats.sipuni.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.wazzup24.com https://api.kaspi.kz https://kaspi.kz https://stats.sipuni.com wss://voip.sipuni.com:* https://voip.sipuni.com:*;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <!-- Запрет встраивания в iframe (clickjacking) — meta-аналог X-Frame-Options.
         frame-ancestors в CSP выше уже это делает, но дублируем referrer-policy. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Eralin CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/crm/assets/index-CnW6jcbL.js"></script>
    <link rel="stylesheet" crossorigin href="/crm/assets/index-BQeJqK94.css">
  </head>
  <body class="antialiased">
    <div id="root"></div>
  </body>
</html>
