    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- Базовый CSP: ограничивает источники скриптов и подключений. На GitHub
         Pages нет HTTP-заголовков, поэтому используем meta — это слабее
         (clickjacking через X-Frame-Options не покрывается, нужен фронтинг
         через Cloudflare/Caddy для полной защиты), но JS-инъекции и
         exfiltration через произвольные домены отсекает.
         Поправь, если добавляешь новый внешний сервис (Stripe, Yandex Metrica и т.п.). -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://stats.sipuni.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: https:;
      worker-src 'self' blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.wazzup24.com https://api.kaspi.kz https://kaspi.kz https://stats.sipuni.com wss://voip.sipuni.com:* https://voip.sipuni.com:* https://prod.spline.design https://*.spline.design;
      frame-src https://app.wazzup24.com https://*.wazzup24.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <!-- Запрет встраивания в iframe (clickjacking) — meta-аналог X-Frame-Options.
         frame-ancestors в CSP выше уже это делает, но дублируем referrer-policy. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
