<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — RPG Персонажи</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1623;--ink2:#1e2840;--slate:#4a5568;--muted:#8896ae;
  --line:#e8ecf4;--bg:#f7f8fc;--white:#fff;
  --acc:#6366f1;--acc-l:#eef2ff;
  --gold:#ca8a04;--gold-l:#fefce8;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#c0392b;--red-l:#fde8e8;
  --blue:#3b82f6;--blue-l:#dbeafe;
  --purple:#8b5cf6;--purple-l:#ede9fe;
  --shadow:0 1px 3px rgba(15,22,35,.06),0 4px 16px rgba(15,22,35,.08);
  --shadow2:0 2px 8px rgba(15,22,35,.08),0 8px 32px rgba(15,22,35,.10);
  --r:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:15px;-webkit-font-smoothing:antialiased;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.shell{display:flex;min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:220px;flex-shrink:0;background:var(--ink);
  display:flex;flex-direction:column;padding:0 0 24px;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;
}
.sb-logo{padding:28px 24px 24px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo h1{
  font-family:'DM Sans',sans-serif;font-size:45px;font-weight:800;
  letter-spacing:-.5px;line-height:1;
  background:linear-gradient(180deg,#fff 0%,#d0e8ff 18%,#7bbfff 32%,#4a9eff 44%,#2979e8 54%,#1a5fcc 64%,#3a8fff 74%,#a0d0ff 84%,#e8f4ff 92%,#fff 100%);
  background-size:100% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sb-logo .tagline{font-size:9px;color:rgba(180,210,255,.45);letter-spacing:2.5px;text-transform:uppercase;margin-top:6px;font-weight:500;}
.sb-nav{padding:14px 10px;flex:1;}
.sb-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 8px 10px;}
.dock-wrap{display:flex;flex-direction:column;gap:3px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:6px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;
  color:rgba(255,255,255,.45);font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:transparent;width:100%;text-align:left;text-decoration:none;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .18s,color .18s;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;transform:scale(1.055) translateX(4px);}
.nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(99,102,241,.12));color:#fff;border:1px solid rgba(99,102,241,.28);}
.nav-item .icon{font-size:16px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:7px;background:rgba(255,255,255,.05);}
.nav-item:hover .icon{transform:scale(1.22) rotate(-6deg);background:rgba(255,255,255,.1);}
.nav-item.active .icon{background:rgba(99,102,241,.25);}
.dock-divider{height:1px;background:rgba(255,255,255,.06);margin:4px 8px;}

.main{margin-left:220px;flex:1;padding:28px 32px 40px;min-width:0;}

/* ─── LOGIN ─── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{background:var(--white);border-radius:20px;padding:48px;box-shadow:var(--shadow2);max-width:480px;width:100%;text-align:center;}
.login-card h2{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px;}
.login-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto;padding-right:4px;}
.login-btn{
  padding:12px 16px;border-radius:12px;border:1.5px solid var(--line);
  background:var(--white);cursor:pointer;font-size:13px;font-weight:600;
  font-family:inherit;color:var(--ink);display:flex;align-items:center;gap:12px;
  transition:all .2s;text-align:left;
}
.login-btn:hover{border-color:var(--acc);background:var(--acc-l);transform:translateY(-2px);box-shadow:var(--shadow);}
.login-btn .av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.login-btn .login-info{flex:1;min-width:0;}
.login-btn .login-name{font-weight:700;}
.login-btn .login-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ─── PAGE HEADER ─── */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-hdr h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;}
.hdr-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:11px;font-weight:700;font-size:12px;border:1px solid;}
.b-gold{background:#fef9c3;color:#92400e;border-color:#fde047;}
.b-hp{background:#fde8e8;color:#c0392b;border-color:#fca5a5;}
.b-lvl{background:var(--green-l);color:var(--green);border-color:#86efac;}
.b-class{background:var(--purple-l);color:var(--purple);border-color:#c4b5fd;}
.logout-btn{padding:7px 14px;border-radius:10px;border:1px solid var(--line);background:var(--white);cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;color:var(--muted);transition:all .15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ─── TABS ─── */
.tabs{display:flex;gap:4px;background:var(--white);border-radius:12px;padding:4px;box-shadow:var(--shadow);margin-bottom:24px;width:fit-content;}
.tab-btn{padding:10px 18px;border-radius:10px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3);}
.tab-btn:hover:not(.active){background:var(--bg);color:var(--ink);}
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* ─── CHARACTER CARDS ─── */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.char-card{
  background:var(--white);border-radius:16px;padding:18px;text-align:center;
  box-shadow:var(--shadow);transition:all .25s;position:relative;overflow:hidden;
}
.char-card:hover{transform:translateY(-4px);box-shadow:var(--shadow2);}
.char-card.is-me{border:2px solid var(--acc);}
.char-card.is-me::after{content:'ВЫ';position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;color:var(--acc);background:var(--acc-l);padding:2px 8px;border-radius:20px;letter-spacing:1px;}

/* Character Pixel Avatar */
.pixel-avatar{
  width:72px;height:72px;margin:0 auto 10px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.12);overflow:visible;
}
.pixel-avatar .body{font-size:32px;position:relative;z-index:2;line-height:1;}
.pixel-avatar .hat{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:24px;z-index:3;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}
.pixel-avatar .pet{position:absolute;bottom:-10px;right:-10px;font-size:20px;z-index:3;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}
.pixel-avatar .weapon{position:absolute;bottom:2px;left:-12px;font-size:18px;z-index:3;transform:rotate(-30deg);filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}
.pixel-avatar .aura{position:absolute;inset:-6px;border-radius:50%;z-index:1;pointer-events:none;}
@keyframes aura-p{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.aura-fire{box-shadow:0 0 14px 4px rgba(239,68,68,.4),0 0 28px rgba(239,68,68,.15);animation:aura-p 2s ease-in-out infinite;}
.aura-ice{box-shadow:0 0 14px 4px rgba(59,130,246,.4),0 0 28px rgba(59,130,246,.15);animation:aura-p 2s ease-in-out infinite;}
.aura-gold{box-shadow:0 0 14px 4px rgba(234,179,8,.5),0 0 28px rgba(234,179,8,.2);animation:aura-p 2s ease-in-out infinite;}
.aura-nature{box-shadow:0 0 14px 4px rgba(16,185,129,.4),0 0 28px rgba(16,185,129,.15);animation:aura-p 2s ease-in-out infinite;}
.aura-shadow{box-shadow:0 0 14px 4px rgba(139,92,246,.4),0 0 28px rgba(139,92,246,.15);animation:aura-p 2s ease-in-out infinite;}
.aura-divine{box-shadow:0 0 18px 6px rgba(251,191,36,.5),0 0 36px rgba(251,191,36,.2);animation:aura-p 1.5s ease-in-out infinite;}

.c-name{font-weight:700;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-class{font-size:10px;color:var(--muted);margin-bottom:3px;}
.c-rop{font-size:10px;color:var(--acc);font-weight:600;margin-bottom:6px;}
.c-lvl{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--green);background:var(--green-l);padding:2px 8px;border-radius:16px;margin-bottom:6px;}
.bars{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.bar-r{display:flex;align-items:center;gap:4px;}
.bar-l{font-size:8px;font-weight:700;width:16px;text-align:right;}
.bar-t{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.bar-f{height:100%;border-radius:3px;transition:width .5s;}
.bar-v{font-size:8px;color:var(--muted);width:36px;font-variant-numeric:tabular-nums;}
.c-gold{font-size:11px;color:#92400e;font-weight:600;display:flex;align-items:center;justify-content:center;gap:3px;}

/* ─── MY CHARACTER SECTION ─── */
.my-grid{display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:start;}
.my-card{background:var(--white);border-radius:20px;padding:28px;text-align:center;box-shadow:var(--shadow2);}
.my-avatar{
  width:100px;height:100px;margin:0 auto 14px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(0,0,0,.15);
}
.my-avatar .body{font-size:44px;position:relative;z-index:2;}
.my-avatar .hat{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:34px;z-index:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
.my-avatar .pet{position:absolute;bottom:-14px;right:-14px;font-size:26px;z-index:3;}
.my-avatar .weapon{position:absolute;bottom:4px;left:-16px;font-size:24px;z-index:3;transform:rotate(-30deg);}
.my-avatar .aura{position:absolute;inset:-8px;border-radius:50%;z-index:1;}
.my-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:2px;}
.my-class-badge{font-size:12px;color:var(--purple);font-weight:600;margin-bottom:4px;}
.my-rop{font-size:11px;color:var(--acc);margin-bottom:14px;}
.my-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-box{background:var(--bg);border-radius:10px;padding:10px;text-align:center;}
.stat-box .v{font-size:18px;font-weight:800;}
.stat-box .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.my-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;text-align:left;}
.mb-row{display:flex;align-items:center;gap:8px;}
.mb-icon{font-size:14px;width:20px;text-align:center;}
.mb-track{flex:1;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
.mb-fill{height:100%;border-radius:4px;transition:width .5s;}
.mb-val{font-size:10px;color:var(--muted);width:60px;text-align:right;font-variant-numeric:tabular-nums;}

/* Equip slots */
.equip-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.eq-slot{
  background:var(--bg);border-radius:10px;padding:8px 4px;text-align:center;
  border:1.5px dashed var(--line);min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;
}
.eq-slot.filled{border-style:solid;border-color:var(--acc);background:var(--acc-l);}
.eq-slot .eq-i{font-size:20px;margin-bottom:2px;}
.eq-slot .eq-n{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.eq-slot .eq-rm{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.eq-slot.filled:hover .eq-rm{display:flex;}

/* Class selector */
.class-select{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0;}
.class-opt{
  padding:12px;border-radius:12px;border:2px solid var(--line);background:var(--white);
  cursor:pointer;text-align:center;transition:all .2s;
}
.class-opt:hover{border-color:var(--acc);transform:translateY(-2px);}
.class-opt.active{border-color:var(--acc);background:var(--acc-l);}
.class-opt .cl-icon{font-size:28px;margin-bottom:4px;}
.class-opt .cl-name{font-size:12px;font-weight:700;}
.class-opt .cl-desc{font-size:9px;color:var(--muted);margin-top:2px;}

/* ─── RIGHT PANEL ─── */
.right-col{display:flex;flex-direction:column;gap:16px;}
.info-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.info-card h3{font-size:15px;font-weight:700;margin-bottom:12px;}

/* Quests */
.quest-list{display:flex;flex-direction:column;gap:8px;}
.quest-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  background:var(--bg);transition:all .2s;border-left:3px solid var(--line);
}
.quest-item.done{opacity:.5;border-left-color:var(--green);}
.quest-item.done .q-title{text-decoration:line-through;}
.q-check{
  width:24px;height:24px;border-radius:7px;border:2px solid var(--line);background:var(--white);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;
  transition:all .2s;flex-shrink:0;
}
.q-check:hover{border-color:var(--green);color:var(--green);}
.q-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.q-body{flex:1;min-width:0;}
.q-title{font-size:12px;font-weight:600;}
.q-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.q-reward{font-size:11px;font-weight:700;color:#92400e;white-space:nowrap;}

/* ─── SHOP ─── */
.shop-section{background:var(--white);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
.shop-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:4px;}
.shop-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.shop-cats{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.shop-cat{padding:6px 12px;border-radius:18px;border:1px solid var(--line);background:var(--white);font-family:inherit;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.shop-cat.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.shop-cat:hover:not(.active){border-color:var(--acc);color:var(--acc);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.shop-item{
  background:var(--bg);border-radius:12px;padding:14px;text-align:center;
  border:1.5px solid transparent;transition:all .2s;position:relative;
}
.shop-item:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:var(--shadow);}
.shop-item.owned{border-color:var(--green);background:var(--green-l);}
.shop-item.equipped{border-color:var(--acc);background:var(--acc-l);}
.shop-item .si-icon{font-size:30px;margin-bottom:6px;display:block;}
.shop-item .si-name{font-size:12px;font-weight:700;margin-bottom:3px;}
.shop-item .si-desc{font-size:9px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.shop-item .si-price{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;color:#92400e;background:#fef9c3;padding:4px 10px;border-radius:16px;}
.shop-item .si-price.free{color:var(--green);background:var(--green-l);}
.buy-btn{
  margin-top:6px;padding:7px 14px;border-radius:8px;border:none;
  background:var(--acc);color:#fff;font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;width:100%;
}
.buy-btn:hover{background:#4f46e5;transform:scale(1.03);}
.buy-btn:disabled{background:#cbd5e1;cursor:not-allowed;transform:none;}
.buy-btn.eq-btn{background:#f59e0b;}
.buy-btn.done-btn{background:var(--green);}
.item-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;}
.ib-owned{background:var(--green-l);color:var(--green);}
.ib-eq{background:var(--acc-l);color:var(--acc);}

/* ─── LEAD SHOP ─── */
.lead-shop{background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:16px;padding:24px;border:1px solid #fde047;margin-top:16px;}
.lead-shop h3{font-size:16px;font-weight:700;color:#92400e;margin-bottom:4px;}
.lead-shop p{font-size:11px;color:#a16207;margin-bottom:14px;}
.lead-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.lead-card{background:rgba(255,255,255,.8);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(202,138,4,.2);transition:all .2s;}
.lead-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(202,138,4,.15);}
.lc-icon{font-size:28px;margin-bottom:6px;}
.lc-title{font-size:13px;font-weight:700;color:#92400e;margin-bottom:3px;}
.lc-desc{font-size:10px;color:#a16207;margin-bottom:8px;}
.lc-price{font-size:15px;font-weight:800;color:#92400e;margin-bottom:6px;}
.lead-buy{padding:8px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;}
.lead-buy:hover{transform:scale(1.03);}
.lead-buy:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--ink);color:#fff;padding:14px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);transform:translateY(120%);opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#059669;}
.toast.error{background:var(--red);}

/* ─── RESPONSIVE ─── */
@media(max-width:1100px){.my-grid{grid-template-columns:1fr;}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:16px;}
  .chars-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
  .burger{display:flex !important;}
}
.burger{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;border-radius:10px;background:var(--white);box-shadow:var(--shadow);border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;}
</style>
</head>
<body>
<button class="burger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="shell">
<aside class="sidebar">
  <div class="sb-logo"><h1>WeGlow</h1><div class="tagline">Sales RPG</div></div>
  <nav class="sb-nav">
    <div class="sb-section">Навигация</div>
    <div class="dock-wrap">
      <a href="dashboard.html" class="nav-item"><span class="icon">◈</span><span>Дашборд</span></a>
      <a href="tv.html" class="nav-item"><span class="icon">🏎️</span><span>Гонка к плану</span></a>
      <a href="game.html" class="nav-item active"><span class="icon">🎮</span><span>Персонажи</span></a>
      <div class="dock-divider"></div>
      <a href="rop.html" class="nav-item"><span class="icon">👥</span><span>Кабинет РОП</span></a>
      <a href="director.html" class="nav-item"><span class="icon">👔</span><span>Кабинет директора</span></a>
    </div>
  </nav>
</aside>

function xpFor(l){ return l*120; }

// ═══════════════════ SUPABASE ════════════════════════════════════
const sbH = { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` };
async function loadData(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1&select=data`,{headers:sbH});
    const rows=await r.json();
    if(rows?.[0]?.data){
      const d=rows[0].data;
      if(d.MANAGERS) MANAGERS=d.MANAGERS;
      if(d.MGR_TO_ROP) MGR_TO_ROP=d.MGR_TO_ROP;
      if(d.GAME_DATA) GAME=d.GAME_DATA;
    }
  }catch(e){console.warn(e);}
}
async function saveGame(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1&select=data`,{headers:sbH});
    const rows=await r.json();
    const c=rows?.[0]?.data||{};
    c.GAME_DATA=GAME;
    await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1`,{
      method:'PATCH',headers:{...sbH,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({data:c})
    });
  }catch(e){console.warn(e);}
}

// ═══════════════════ HELPERS ═════════════════════════════════════
function allNames(){
  const s=new Set();
  for(const p of Object.keys(MANAGERS))
    for(const i of Object.keys(MANAGERS[p]||{}))
      if(MANAGERS[p][i]?.name) s.add(MANAGERS[p][i].name);
  return [...s].sort();
}
function getRop(n){ return MGR_TO_ROP[n]||''; }
function getMgrStats(n){
  const now=new Date(), mm=String(now.getMonth()+1).padStart(2,'0'), yy=now.getFullYear();
  let leads=0,deals=0,budget=0;
  for(const p of Object.keys(MANAGERS)){
    for(const i of Object.keys(MANAGERS[p]||{})){
      const m=MANAGERS[p][i];
      if(m?.name!==n) continue;
      for(const [dt,v] of Object.entries(m.daily||{})){
        const ps=dt.split('.');
        if(ps[1]===mm&&ps[2]===String(yy)){leads+=(v[0]||0);deals+=(v[1]||0);budget+=(v[2]||0);}
      }
    }
  }
  return{leads,deals,budget};
}

// ─── INIT GAME DATA ───
function ensureGD(n){
  if(!GAME[n]) GAME[n]={
    class:'warrior',coins:0,level:1,xp:0,hp:100,maxHp:100,
    str:5,int:5,agi:5,wis:5,
    skin:'default',hat:null,weapon:null,pet:null,aura:null,
    purchases:[],history:[],leadsBought:0,questsDone:[]
  };
  return GAME[n];
}

// ─── RECALC ───
function recalc(n){
  const g=ensureGD(n), s=getMgrStats(n);
  // Earned coins
  let earned = s.leads*5 + s.deals*50 + Math.floor(s.budget/100000)*100;
  if(s.leads>0 && (s.deals/s.leads*100)>30) earned+=150;
  // Spent
  let spent=0;(g.history||[]).forEach(h=>{if(h.amt<0) spent+=Math.abs(h.amt);});
  g.coins=Math.max(0, earned-spent);
  // XP & level
  let xp=earned, lvl=1, need=xpFor(1);
  while(xp>=need&&lvl<99){xp-=need;lvl++;need=xpFor(lvl);}
  g.level=lvl; g.xpInLevel=xp; g.xpNeeded=need;
  // HP based on level + class
  g.maxHp = 100 + (lvl-1)*10;
  g.hp = g.maxHp; // always full (no damage mechanic yet)
  // Stats from class + level
  const cl=g.class;
  const base=3+lvl;
  g.str = base + (cl==='warrior'?lvl*2 : cl==='rogue'?lvl : 0);
  g.int = base + (cl==='mage'?lvl*2 : cl==='healer'?lvl : 0);
  g.agi = base + (cl==='rogue'?lvl*2 : cl==='warrior'?lvl : 0);
  g.wis = base + (cl==='healer'?lvl*2 : cl==='mage'?lvl : 0);
  g._stats = s;
  return g;
}

      <div class="eq-slot ${g.weapon?'filled':''}" onclick="switchTab('shop',document.querySelectorAll('.tab-btn')[2])">
        <span class="eq-i">${wpn?wpn.icon:'⚔️'}</span><span class="eq-n">Оружие</span>
        ${g.weapon?`<button class="eq-rm" onclick="event.stopPropagation();unequip('weapon')">×</button>`:''}
      </div>
      <div class="eq-slot ${g.pet?'filled':''}" onclick="switchTab('shop',document.querySelectorAll('.tab-btn')[2])">
        <span class="eq-i">${pet?pet.icon:'🐾'}</span><span class="eq-n">Питомец</span>
        ${g.pet?`<button class="eq-rm" onclick="event.stopPropagation();unequip('pet')">×</button>`:''}
      </div>
    </div>
    <div style="margin-top:14px">
      <div class="equip-title">Класс</div>
      <div class="class-select">
        ${Object.entries(CLASSES).map(([k,c])=>`
          <div class="class-opt ${g.class===k?'active':''}" onclick="setClass('${k}')">
            <div class="cl-icon">${c.icon}</div>
            <div class="cl-name">${c.name}</div>
            <div class="cl-desc">${c.desc}</div>
          </div>`).join('')}
      </div>
    </div>
  `;

  // Right column — sales stats + earn table
  document.getElementById('right-col').innerHTML=`
    <div class="info-card">
      <h3>📊 Продажи (этот месяц)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px">
        <div class="stat-box"><div class="v">${s.leads}</div><div class="l">Лиды</div></div>
        <div class="stat-box"><div class="v">${s.deals}</div><div class="l">Сделки</div></div>
        <div class="stat-box"><div class="v">${(s.budget/1000).toFixed(0)}к</div><div class="l">Выручка ₸</div></div>
      </div>
    </div>
    <div class="info-card">
      <h3>💰 Как заработать монеты</h3>
      <table class="earn-table">
        <thead><tr><th>Действие</th><th>Монеты</th></tr></thead>
        <tbody>
          <tr><td>Новый лид</td><td class="earn-plus">+5 🪙</td></tr>
          <tr><td>Закрытая сделка</td><td class="earn-plus">+50 🪙</td></tr>
          <tr><td>100 000 ₸ выручки</td><td class="earn-plus">+100 🪙</td></tr>
          <tr><td>Конверсия > 30%</td><td class="earn-plus">+150 🪙</td></tr>
          <tr><td>Выполнение квестов</td><td class="earn-plus">+50…1000 🪙</td></tr>
        </tbody>
      </table>
    </div>
    <div class="info-card">
      <h3>📜 Последние операции</h3>
      ${(g.history||[]).length===0?'<div style="color:var(--muted);font-size:12px;padding:8px">Пока пусто</div>':
      '<div style="max-height:200px;overflow-y:auto">'+
      (g.history||[]).slice(-10).reverse().map(h=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px">
          <span>${h.desc}</span>
          <span style="font-weight:700;color:${h.amt>=0?'var(--green)':'var(--red)'}">${h.amt>=0?'+':''}${h.amt} 🪙</span>
        </div>`).join('')+'</div>'}
    </div>
  `;
}

function setClass(c){ GAME[currentUser].class=c; renderAll(); saveGame(); toast(`Класс: ${CLASSES[c].name}!`,'success'); }
function unequip(slot){ const g=GAME[currentUser]; g[slot]=slot==='skin'?'default':null; renderAll(); saveGame(); toast('Снято'); }

// ═══════════════════ SHOP ═════════════════════════════════════════
let shopCat='skins';
function renderShop(){
  const g=GAME[currentUser]; if(!g) return;
  const cats=[
    {id:'skins',label:'Скины',icon:'🎭'},
    {id:'hats',label:'Шляпы',icon:'🎩'},
    {id:'weapons',label:'Оружие',icon:'⚔️'},
    {id:'pets',label:'Питомцы',icon:'🐾'},
    {id:'auras',label:'Ауры',icon:'✨'},
  ];
  const ITEMS={skins:SKINS,hats:HATS,weapons:WEAPONS,pets:PETS,auras:AURAS};
  const SLOTS={skins:'skin',hats:'hat',weapons:'weapon',pets:'pet',auras:'aura'};
  const items=ITEMS[shopCat]||[];
  const slot=SLOTS[shopCat];

  document.getElementById('shop-section').innerHTML=`
    <div class="shop-title">🛒 Магазин</div>
    <div class="shop-sub">Потратьте монеты на экипировку</div>
    <div class="shop-cats">${cats.map(c=>`<button class="shop-cat ${shopCat===c.id?'active':''}" onclick="shopCat='${c.id}';renderShop()">${c.icon} ${c.label}</button>`).join('')}</div>
    <div class="shop-grid">${items.map(item=>{
      const owned=g.purchases.includes(`${shopCat}:${item.id}`)||(shopCat==='skins'&&item.id==='default');
      const equipped=g[slot]===item.id;
      const can=g.coins>=item.price;
      let badge='',btn='';
      if(equipped){badge=`<span class="item-badge ib-eq">Надето</span>`;btn=`<button class="buy-btn done-btn" disabled>Надето ✓</button>`;}
      else if(owned){badge=`<span class="item-badge ib-owned">Есть</span>`;btn=`<button class="buy-btn eq-btn" onclick="equip('${shopCat}','${item.id}','${slot}')">Надеть</button>`;}
      else{btn=`<button class="buy-btn" ${!can?'disabled':''} onclick="buy('${shopCat}','${item.id}','${slot}',${item.price},'${item.name}')">${can?'Купить':'Мало монет'}</button>`;}
      return `<div class="shop-item ${equipped?'equipped':owned?'owned':''}">
        ${badge}<span class="si-icon">${item.icon}</span>
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
        ${item.price>0?`<div class="si-price">🪙 ${item.price}</div>`:`<div class="si-price free">Бесплатно</div>`}
        ${btn}
      </div>`;
    }).join('')}</div>
  `;

  // Lead shop
  document.getElementById('lead-shop-section').innerHTML=`
    <h3>📋 Купить лиды</h3>
    <p>Потратьте монеты чтобы получить клиентов</p>
    <div class="lead-cards">${LEADS.map(p=>{
      const can=g.coins>=p.price;
      return `<div class="lead-card"><div class="lc-icon">${p.icon}</div><div class="lc-title">${p.title}</div><div class="lc-desc">${p.desc}</div><div class="lc-price">🪙 ${p.price}</div>
        <button class="lead-buy" ${!can?'disabled':''} onclick="buyLead(${p.count},${p.price})">${can?'Купить':'Мало монет'}</button></div>`;
    }).join('')}</div>
  `;
}

function buy(cat,id,slot,price,name){
  const g=GAME[currentUser];
  if(g.coins<price){toast('Мало монет!','error');return;}
  g.purchases.push(`${cat}:${id}`);
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`Покупка: ${name}`,amt:-price});
  g[slot]=id;
  recalc(currentUser); renderAll(); saveGame();
  toast(`${name} куплено и надето!`,'success');
}
function equip(cat,id,slot){ GAME[currentUser][slot]=id; renderAll(); saveGame(); toast('Экипировка обновлена!','success'); }
function buyLead(count,price){
  const g=GAME[currentUser];
  if(g.coins<price){toast('Мало монет!','error');return;}
  g.leadsBought=(g.leadsBought||0)+count;
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`+${count} лид(ов)`,amt:-price});
  recalc(currentUser); renderAll(); saveGame();
  toast(`+${count} лид(ов) куплено!`,'success');
}

// ═══════════════════ QUESTS ═══════════════════════════════════════
function renderQuests(){
  const quests=getQuests(currentUser), g=GAME[currentUser];
  const done=quests.filter(q=>q.claimed).length;
  document.getElementById('quests-card').innerHTML=`
    <h3>📜 Квесты (${done}/${quests.length} выполнено)</h3>
    <div class="quest-list">${quests.map(q=>{
      const ready=q.check&&!q.claimed;
      const isDone=q.claimed;
      return `<div class="quest-item ${isDone?'done':''}" style="border-left-color:${isDone?'var(--green)':ready?'#eab308':'var(--line)'}">
        <div class="q-check ${isDone?'done':''}" ${ready?`onclick="claimQuest('${q.id}',${q.reward})" style="cursor:pointer;border-color:${ready?'#eab308':'var(--line)'};color:${ready?'#eab308':'transparent'}"`:''}>${isDone?'✓':ready?'!':'·'}</div>
        <div class="q-body"><div class="q-title">${q.title}</div><div class="q-sub">${q.desc}</div></div>
        <div class="q-reward">${isDone?'✅ Получено':ready?`🪙 +${q.reward}`:`🪙 ${q.reward}`}</div>
      </div>`;
    }).join('')}</div>
  `;
}
function claimQuest(id,reward){
  const g=GAME[currentUser];
  if(!g.questsDone) g.questsDone=[];
  if(g.questsDone.includes(id)) return;
  g.questsDone.push(id);
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`Квест выполнен!`,amt:reward});
  recalc(currentUser); renderAll(); saveGame();
  toast(`Квест выполнен! +${reward} 🪙`,'success');
}

// ═══════════════════ TOAST ═══════════════════════════════════════
function toast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',2500);}

// ═══════════════════ INIT ════════════════════════════════════════
async function init(){
  await loadData();
  allNames().forEach(n=>ensureGD(n));
  if(currentUser&&allNames().includes(currentUser)){login(currentUser);}
  else{currentUser=null;localStorage.removeItem('game_user');renderLogin();}
  setInterval(async()=>{await loadData();if(currentUser)renderAll();},60000);
}
init();
</script>
</body>
</html>
