<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — RPG Персонажи</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DARK FANTASY RPG THEME
   ═══════════════════════════════════════════════════════════════ */
:root{
  --void:#0a0e1a;--abyss:#0f1528;--deep:#141b2d;--panel:#1a2237;--card:#1e2840;
  --border:rgba(255,215,0,.08);--border-h:rgba(255,215,0,.2);
  --gold:#fbbf24;--gold-d:#b8860b;--gold-glow:rgba(251,191,36,.25);
  --hp:#ef4444;--mp:#6366f1;--xp:#eab308;--green:#10b981;
  --muted:rgba(200,210,230,.4);--text:rgba(230,235,245,.88);--white:#f0f0f0;
  --acc:#a78bfa;--acc-glow:rgba(167,139,250,.3);
  --red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --shadow:0 2px 12px rgba(0,0,0,.5),0 0 1px rgba(255,215,0,.1);
  --shadow2:0 4px 24px rgba(0,0,0,.6),0 0 2px rgba(255,215,0,.15);
  --glow-gold:0 0 20px rgba(251,191,36,.15),0 0 40px rgba(251,191,36,.05);
  --r:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:15px;-webkit-font-smoothing:antialiased;}
body{
  font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;
  background:var(--void);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(139,92,246,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(251,191,36,.03) 0%, transparent 60%);
  background-attachment:fixed;
}
.shell{display:flex;min-height:100vh;}

/* ═══ PARTICLES BG ═══ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{
  position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;
  opacity:0;animation:float-up linear infinite;
  box-shadow:0 0 6px var(--gold),0 0 12px rgba(251,191,36,.3);
}
@keyframes float-up{
  0%{opacity:0;transform:translateY(0) scale(0.5);}
  10%{opacity:.7;}
  90%{opacity:.3;}
  100%{opacity:0;transform:translateY(-100vh) scale(0);}
}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:220px;flex-shrink:0;
  background:linear-gradient(180deg,#0d1220 0%,#111827 50%,#0d1220 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:0 0 24px;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;
}
.sb-logo{padding:28px 24px 24px;border-bottom:1px solid var(--border);}
.sb-logo h1{
  font-family:'Playfair Display',serif;font-size:42px;font-weight:800;
  letter-spacing:-.5px;line-height:1;
  background:linear-gradient(180deg,#fef3c7 0%,#fbbf24 30%,#b8860b 60%,#fbbf24 80%,#fef3c7 100%);
  background-size:100% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gold-shimmer 4s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(251,191,36,.3));
}
@keyframes gold-shimmer{0%,100%{background-position:0 0}50%{background-position:0 100%}}
.sb-logo .tagline{font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:600;opacity:.6;}
.sb-nav{padding:14px 10px;flex:1;}
.sb-section{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);padding:0 8px 10px;opacity:.4;}
.dock-wrap{display:flex;flex-direction:column;gap:3px;background:rgba(255,215,0,.02);border:1px solid var(--border);border-radius:14px;padding:6px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;
  color:rgba(255,255,255,.35);font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:transparent;width:100%;text-align:left;text-decoration:none;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.nav-item:hover{background:rgba(251,191,36,.08);color:var(--gold);transform:scale(1.04) translateX(4px);}
.nav-item.active{
  background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.04));
  color:var(--gold);border:1px solid rgba(251,191,36,.2);
  box-shadow:0 0 12px rgba(251,191,36,.08);
}
.nav-item .icon{font-size:16px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:7px;background:rgba(255,255,255,.03);}
.nav-item:hover .icon{transform:scale(1.22) rotate(-6deg);background:rgba(251,191,36,.1);}
.nav-item.active .icon{background:rgba(251,191,36,.15);}
.dock-divider{height:1px;background:var(--border);margin:4px 8px;}
.main{margin-left:220px;flex:1;padding:28px 32px 40px;min-width:0;position:relative;z-index:1;}

/* ═══ LOGIN SCREEN ═══ */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{
  background:linear-gradient(145deg,rgba(26,34,55,.95),rgba(20,27,45,.98));
  border:1px solid var(--border-h);border-radius:24px;padding:48px;
  box-shadow:var(--shadow2),var(--glow-gold);max-width:500px;width:100%;text-align:center;
  backdrop-filter:blur(20px);position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;inset:-1px;border-radius:24px;padding:1px;
  background:linear-gradient(135deg,rgba(251,191,36,.3),transparent 40%,transparent 60%,rgba(139,92,246,.2));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
}
.login-card h2{
  font-family:'Playfair Display',serif;font-size:32px;margin-bottom:8px;
  background:linear-gradient(135deg,var(--gold),#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(251,191,36,.3));
}
.login-card>p{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.6;}
.login-list{display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto;padding-right:4px;}
.login-list::-webkit-scrollbar{width:4px;}.login-list::-webkit-scrollbar-track{background:transparent;}
.login-list::-webkit-scrollbar-thumb{background:rgba(251,191,36,.2);border-radius:4px;}
.login-btn{
  padding:12px 16px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;font-size:13px;font-weight:600;
  font-family:inherit;color:var(--text);display:flex;align-items:center;gap:12px;
  transition:all .25s;text-align:left;
}
.login-btn:hover{
  border-color:var(--gold);background:rgba(251,191,36,.06);
  transform:translateY(-2px);box-shadow:var(--shadow),0 0 16px rgba(251,191,36,.1);
}
.login-btn .av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;overflow:hidden;}
.login-btn .login-info{flex:1;min-width:0;}
.login-btn .login-name{font-weight:700;color:var(--white);}
.login-btn .login-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* ═══ PAGE HEADER ═══ */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-hdr h2{
  font-family:'Playfair Display',serif;font-size:26px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),#fef3c7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 8px rgba(251,191,36,.2));
}
.hdr-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{
  display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:11px;
  font-weight:700;font-size:12px;border:1px solid;
  backdrop-filter:blur(8px);
}
.b-gold{background:rgba(251,191,36,.1);color:var(--gold);border-color:rgba(251,191,36,.25);}
.b-hp{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.25);}
.b-lvl{background:rgba(16,185,129,.1);color:#34d399;border-color:rgba(16,185,129,.25);}
.b-class{background:rgba(139,92,246,.1);color:#a78bfa;border-color:rgba(139,92,246,.25);}
.logout-btn{
  padding:7px 14px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;font-size:11px;font-weight:500;
  font-family:inherit;color:var(--muted);transition:all .15s;
}
.logout-btn:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.06);}

/* ═══ TABS ═══ */
.tabs{
  display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:4px;box-shadow:var(--shadow);margin-bottom:24px;width:fit-content;
}
.tab-btn{
  padding:10px 18px;border-radius:10px;border:none;background:transparent;
  font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:all .25s;
}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.08));
  color:var(--gold);box-shadow:0 0 12px rgba(251,191,36,.15);
  border:1px solid rgba(251,191,36,.2);
}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.04);color:var(--text);}
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* ═══ CHARACTER CARDS ═══ */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
.char-card{
  background:linear-gradient(145deg,var(--card),var(--panel));
  border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;
  box-shadow:var(--shadow);transition:all .35s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
  animation:card-enter .5s ease-out both;
}
.char-card::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:radial-gradient(ellipse at 50% 0%,rgba(251,191,36,.04),transparent 70%);
  pointer-events:none;transition:opacity .3s;opacity:0;
}
.char-card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:var(--shadow2),0 0 30px rgba(251,191,36,.1);
  border-color:var(--border-h);
}
.char-card:hover::before{opacity:1;}
.char-card.is-me{border:2px solid var(--gold);box-shadow:var(--shadow),0 0 20px rgba(251,191,36,.12);}
.char-card.is-me::after{
  content:'ВЫ';position:absolute;top:10px;right:10px;font-size:8px;font-weight:800;
  color:var(--void);background:var(--gold);padding:3px 10px;border-radius:20px;letter-spacing:1.5px;
}

@keyframes card-enter{
  from{opacity:0;transform:translateY(24px) scale(.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.chars-grid .char-card:nth-child(1){animation-delay:0s}
.chars-grid .char-card:nth-child(2){animation-delay:.06s}
.chars-grid .char-card:nth-child(3){animation-delay:.12s}
.chars-grid .char-card:nth-child(4){animation-delay:.18s}
.chars-grid .char-card:nth-child(5){animation-delay:.24s}
.chars-grid .char-card:nth-child(6){animation-delay:.3s}
.chars-grid .char-card:nth-child(7){animation-delay:.36s}
.chars-grid .char-card:nth-child(8){animation-delay:.42s}
.chars-grid .char-card:nth-child(9){animation-delay:.48s}
.chars-grid .char-card:nth-child(10){animation-delay:.54s}

/* ═══ PIXEL AVATAR ═══ */
.pixel-avatar{
  width:80px;height:80px;margin:0 auto 12px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 15px rgba(251,191,36,.08);overflow:visible;
  animation:avatar-breathe 3s ease-in-out infinite;
}
@keyframes avatar-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.pixel-avatar .body{position:relative;z-index:2;line-height:1;image-rendering:pixelated;}
.pixel-avatar .hat{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:24px;z-index:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.pixel-avatar .pet{position:absolute;bottom:-10px;right:-10px;font-size:20px;z-index:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.pixel-avatar .weapon{position:absolute;bottom:2px;left:-12px;font-size:18px;z-index:3;transform:rotate(-30deg);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.pixel-avatar .aura{position:absolute;inset:-6px;border-radius:50%;z-index:1;pointer-events:none;}
@keyframes aura-p{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.aura-fire{box-shadow:0 0 18px 6px rgba(239,68,68,.5),0 0 36px rgba(239,68,68,.2);animation:aura-p 2s ease-in-out infinite;}
.aura-ice{box-shadow:0 0 18px 6px rgba(59,130,246,.5),0 0 36px rgba(59,130,246,.2);animation:aura-p 2s ease-in-out infinite;}
.aura-gold{box-shadow:0 0 18px 6px rgba(234,179,8,.6),0 0 36px rgba(234,179,8,.25);animation:aura-p 2s ease-in-out infinite;}
.aura-nature{box-shadow:0 0 18px 6px rgba(16,185,129,.5),0 0 36px rgba(16,185,129,.2);animation:aura-p 2s ease-in-out infinite;}
.aura-shadow{box-shadow:0 0 18px 6px rgba(139,92,246,.5),0 0 36px rgba(139,92,246,.2);animation:aura-p 2s ease-in-out infinite;}
.aura-divine{box-shadow:0 0 24px 8px rgba(251,191,36,.6),0 0 48px rgba(251,191,36,.25);animation:aura-p 1.5s ease-in-out infinite;}

/* ═══ PIXEL ART SVG CHARACTERS ═══ */
.pixel-body{width:48px;height:48px;position:relative;z-index:2;image-rendering:pixelated;}
.pixel-body-big{width:64px;height:64px;position:relative;z-index:2;image-rendering:pixelated;}

.c-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);}
.c-class{font-size:10px;color:var(--muted);margin-bottom:3px;}
.c-rop{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:6px;}
.c-lvl{
  display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;
  color:#34d399;background:rgba(16,185,129,.12);padding:3px 10px;border-radius:16px;
  margin-bottom:8px;border:1px solid rgba(16,185,129,.2);
}

/* ═══ GAME BARS ═══ */
.bars{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.bar-r{display:flex;align-items:center;gap:4px;}
.bar-l{font-size:8px;font-weight:800;width:18px;text-align:right;text-shadow:0 0 6px currentColor;}
.bar-t{
  flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;
  border:1px solid rgba(255,255,255,.05);position:relative;
}
.bar-f{
  height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.bar-f::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:bar-shimmer 2s ease-in-out infinite;
}
@keyframes bar-shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.bar-v{font-size:8px;color:var(--muted);width:40px;font-variant-numeric:tabular-nums;}
.c-gold{font-size:11px;color:var(--gold);font-weight:700;display:flex;align-items:center;justify-content:center;gap:3px;}

/* ═══ MY CHARACTER ═══ */
.my-grid{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
.my-card{
  background:linear-gradient(145deg,var(--card),var(--panel));
  border:1px solid var(--border-h);border-radius:24px;padding:32px;text-align:center;
  box-shadow:var(--shadow2),var(--glow-gold);position:relative;overflow:hidden;
}
.my-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(251,191,36,.06),transparent 60%);
  pointer-events:none;
}
.my-avatar{
  width:110px;height:110px;margin:0 auto 16px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 30px rgba(0,0,0,.5),0 0 20px rgba(251,191,36,.1);
  animation:avatar-breathe 3s ease-in-out infinite;
}
.my-avatar .body{font-size:44px;position:relative;z-index:2;}
.my-avatar .hat{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:36px;z-index:3;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
.my-avatar .pet{position:absolute;bottom:-16px;right:-16px;font-size:28px;z-index:3;}
.my-avatar .weapon{position:absolute;bottom:4px;left:-18px;font-size:26px;z-index:3;transform:rotate(-30deg);}
.my-avatar .aura{position:absolute;inset:-10px;border-radius:50%;z-index:1;}
.my-name{
  font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px;
  background:linear-gradient(135deg,var(--white),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.my-class-badge{font-size:12px;color:var(--acc);font-weight:600;margin-bottom:4px;}
.my-rop{font-size:11px;color:var(--gold);margin-bottom:16px;opacity:.7;}
.my-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-box{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:12px;text-align:center;transition:all .2s;
}
.stat-box:hover{border-color:var(--border-h);background:rgba(251,191,36,.03);}
.stat-box .v{font-size:20px;font-weight:800;}
.stat-box .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
.my-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;text-align:left;}
.mb-row{display:flex;align-items:center;gap:8px;}
.mb-icon{font-size:14px;width:20px;text-align:center;}
.mb-track{
  flex:1;height:12px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;
  border:1px solid rgba(255,255,255,.05);position:relative;
}
.mb-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.mb-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:bar-shimmer 2s ease-in-out infinite;
}
.mb-val{font-size:10px;color:var(--muted);width:64px;text-align:right;font-variant-numeric:tabular-nums;}

/* Equip slots */
.equip-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;opacity:.6;}
.equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.eq-slot{
  background:rgba(255,255,255,.02);border-radius:12px;padding:10px 4px;text-align:center;
  border:1.5px dashed rgba(255,255,255,.08);min-height:64px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .25s;position:relative;
}
.eq-slot:hover{border-color:var(--gold);background:rgba(251,191,36,.04);}
.eq-slot.filled{border-style:solid;border-color:var(--acc);background:rgba(167,139,250,.06);}
.eq-slot .eq-i{font-size:22px;margin-bottom:3px;}
.eq-slot .eq-n{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.eq-slot .eq-rm{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.eq-slot.filled:hover .eq-rm{display:flex;}

/* Class selector */
.class-select{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0;}
.class-opt{
  padding:14px;border-radius:14px;border:2px solid var(--border);
  background:rgba(255,255,255,.02);cursor:pointer;text-align:center;transition:all .25s;
}
.class-opt:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 0 16px rgba(251,191,36,.08);}
.class-opt.active{border-color:var(--gold);background:rgba(251,191,36,.06);box-shadow:0 0 20px rgba(251,191,36,.1);}
.class-opt .cl-icon{font-size:30px;margin-bottom:4px;}
.class-opt .cl-name{font-size:12px;font-weight:700;color:var(--white);}
.class-opt .cl-desc{font-size:9px;color:var(--muted);margin-top:2px;}

/* ═══ RIGHT PANEL ═══ */
.right-col{display:flex;flex-direction:column;gap:16px;}
.info-card{

// ═══════════════════ PIXEL ART SVG GENERATOR ═══════════════════
function pixelSVG(skinId, size){
  const s = size||48;
  const colors = {
    default:  {body:'#4a90d9',hair:'#8B4513',skin:'#f4c794',eyes:'#333',acc:'#3a7bd5'},
    knight:   {body:'#c0c0c0',hair:'#666',skin:'#f4c794',eyes:'#333',acc:'#FFD700'},
    ninja:    {body:'#1a1a2e',hair:'#1a1a2e',skin:'#f4c794',eyes:'#e74c3c',acc:'#c0392b'},
    wizard:   {body:'#6c3483',hair:'#9b59b6',skin:'#f4c794',eyes:'#f39c12',acc:'#8e44ad'},
    robot:    {body:'#7f8c8d',hair:'#95a5a6',skin:'#bdc3c7',eyes:'#2ecc71',acc:'#e74c3c'},
    devil:    {body:'#c0392b',hair:'#e74c3c',skin:'#e8a87c',eyes:'#f1c40f',acc:'#e74c3c'},
    angel:    {body:'#f0f0f0',hair:'#ffeaa7',skin:'#f4c794',eyes:'#74b9ff',acc:'#ffd32a'},
    alien:    {body:'#2d3436',hair:'#00b894',skin:'#55efc4',eyes:'#000',acc:'#00cec9'},
    king:     {body:'#6c3483',hair:'#2c3e50',skin:'#f4c794',eyes:'#333',acc:'#f1c40f'},
    dragon:   {body:'#27ae60',hair:'#e74c3c',skin:'#2ecc71',eyes:'#f39c12',acc:'#e74c3c'},
  };
  const c = colors[skinId]||colors.default;
  const px = s/12;
  // 12x12 pixel grid character
  const grid = [
    '....HHHH....',
    '...HHHHHH...',
    '..HSSSSSSH..',
    '..SEESSEEE..',
    '..SSSMSSSS..',
    '...SSMMSS...',
    '....BBBB....',
    '...BBBBBB...',
    '..AABBBBAA..',
    '..BB.BB.BB..',
    '..BB.BB.BB..',
    '..LL..LL.LL.',
  ];
  let rects='';
  for(let y=0;y<12;y++){
    for(let x=0;x<12;x++){
      const ch=grid[y]?grid[y][x]:'.';
      let fill=null;
      if(ch==='H') fill=c.hair;
      else if(ch==='S') fill=c.skin;
      else if(ch==='E') fill=c.eyes;
      else if(ch==='M') fill=c.skin; // mouth area same as skin
      else if(ch==='B') fill=c.body;
      else if(ch==='A') fill=c.acc;
      else if(ch==='L') fill=c.body;
      if(fill) rects+=`<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${fill}"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${s} ${s}" class="${size>48?'pixel-body-big':'pixel-body'}" style="width:${size>48?64:48}px;height:${size>48?64:48}px">${rects}</svg>`;
}

function xpFor(l){ return l*120; }

// ═══════════════════ STATE ═══════════════════════════════════════
let MANAGERS={}, MGR_TO_ROP={}, GAME={};
let currentUser = localStorage.getItem('game_user')||null;

// ═══════════════════ SUPABASE ════════════════════════════════════
const sbH = { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` };
async function loadData(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1&select=data`,{headers:sbH});
    const rows=await r.json();
    if(rows?.[0]?.data){
      const d=rows[0].data;
      if(d.MANAGERS) MANAGERS=d.MANAGERS;
      if(d.MGR_TO_ROP) MGR_TO_ROP=d.MGR_TO_ROP;
      if(d.GAME_DATA) GAME=d.GAME_DATA;
    }
  }catch(e){console.warn(e);}
}
async function saveGame(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1&select=data`,{headers:sbH});
    const rows=await r.json();
    const c=rows?.[0]?.data||{};
    c.GAME_DATA=GAME;
    await fetch(`${SB_URL}/rest/v1/weglow_data?id=eq.1`,{
      method:'PATCH',headers:{...sbH,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({data:c})
    });
  }catch(e){console.warn(e);}
}

// ═══════════════════ HELPERS ═════════════════════════════════════
function allNames(){
  const s=new Set();
  for(const p of Object.keys(MANAGERS))
    for(const i of Object.keys(MANAGERS[p]||{}))
      if(MANAGERS[p][i]?.name) s.add(MANAGERS[p][i].name);
  return [...s].sort();
}
function getRop(n){ return MGR_TO_ROP[n]||''; }
function getMgrStats(n){
  const now=new Date(), mm=String(now.getMonth()+1).padStart(2,'0'), yy=now.getFullYear();
  let leads=0,deals=0,budget=0;
  for(const p of Object.keys(MANAGERS)){
    for(const i of Object.keys(MANAGERS[p]||{})){
      const m=MANAGERS[p][i];
      if(m?.name!==n) continue;
      for(const [dt,v] of Object.entries(m.daily||{})){
        const ps=dt.split('.');
        if(ps[1]===mm&&ps[2]===String(yy)){leads+=(v[0]||0);deals+=(v[1]||0);budget+=(v[2]||0);}
      }
    }
  }
  return{leads,deals,budget};
}

// ─── INIT GAME DATA ───
function ensureGD(n){
  if(!GAME[n]) GAME[n]={
    class:'warrior',coins:0,level:1,xp:0,hp:100,maxHp:100,
    str:5,int:5,agi:5,wis:5,
    skin:'default',hat:null,weapon:null,pet:null,aura:null,
    purchases:[],history:[],leadsBought:0,questsDone:[]
  };
  return GAME[n];
}

// ─── RECALC ───
function recalc(n){
  const g=ensureGD(n), s=getMgrStats(n);
  let earned = s.leads*5 + s.deals*50 + Math.floor(s.budget/100000)*100;
  if(s.leads>0 && (s.deals/s.leads*100)>30) earned+=150;
  let spent=0;(g.history||[]).forEach(h=>{if(h.amt<0) spent+=Math.abs(h.amt);});
  g.coins=Math.max(0, earned-spent);
  let xp=earned, lvl=1, need=xpFor(1);
  while(xp>=need&&lvl<99){xp-=need;lvl++;need=xpFor(lvl);}
  g.level=lvl; g.xpInLevel=xp; g.xpNeeded=need;
  g.maxHp = 100 + (lvl-1)*10;
  g.hp = g.maxHp;
  const cl=g.class;
  const base=3+lvl;
  g.str = base + (cl==='warrior'?lvl*2 : cl==='rogue'?lvl : 0);
  g.int = base + (cl==='mage'?lvl*2 : cl==='healer'?lvl : 0);
  g.agi = base + (cl==='rogue'?lvl*2 : cl==='warrior'?lvl : 0);
  g.wis = base + (cl==='healer'?lvl*2 : cl==='mage'?lvl : 0);
  g._stats = s;
  return g;
}

      else{btn=`<button class="buy-btn" ${!can?'disabled':''} onclick="buy('${shopCat}','${item.id}','${slot}',${item.price},'${item.name}')">${can?'Купить':'Мало монет'}</button>`;}
      return `<div class="shop-item ${equipped?'equipped':owned?'owned':''} ${rarity}">
        ${badge}<span class="si-icon">${item.icon}</span>
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
        ${item.price>0?`<div class="si-price">🪙 ${item.price}</div>`:`<div class="si-price free">Бесплатно</div>`}
        ${btn}
      </div>`;
    }).join('')}</div>
  `;

  document.getElementById('lead-shop-section').innerHTML=`
    <h3>📋 Купить лиды</h3>
    <p>Потратьте монеты чтобы получить клиентов</p>
    <div class="lead-cards">${LEADS.map(p=>{
      const can=g.coins>=p.price;
      return `<div class="lead-card"><div class="lc-icon">${p.icon}</div><div class="lc-title">${p.title}</div><div class="lc-desc">${p.desc}</div><div class="lc-price">🪙 ${p.price}</div>
        <button class="lead-buy" ${!can?'disabled':''} onclick="buyLead(${p.count},${p.price})">${can?'Купить':'Мало монет'}</button></div>`;
    }).join('')}</div>
  `;
}

function buy(cat,id,slot,price,name){
  const g=GAME[currentUser];
  if(g.coins<price){toast('Мало монет!','error');return;}
  g.purchases.push(`${cat}:${id}`);
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`Покупка: ${name}`,amt:-price});
  g[slot]=id;
  recalc(currentUser); renderAll(); saveGame();
  // Purchase flash effect
  document.querySelector('.my-card')?.classList.add('flash-purchase');
  setTimeout(()=>document.querySelector('.my-card')?.classList.remove('flash-purchase'),600);
  toast(`${name} куплено и надето!`,'success');
}
function equip(cat,id,slot){ GAME[currentUser][slot]=id; renderAll(); saveGame(); toast('Экипировка обновлена!','success'); }
function buyLead(count,price){
  const g=GAME[currentUser];
  if(g.coins<price){toast('Мало монет!','error');return;}
  g.leadsBought=(g.leadsBought||0)+count;
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`+${count} лид(ов)`,amt:-price});
  recalc(currentUser); renderAll(); saveGame();
  toast(`+${count} лид(ов) куплено!`,'success');
}

// ═══════════════════ QUESTS ═══════════════════════════════════════
function renderQuests(){
  const quests=getQuests(currentUser), g=GAME[currentUser];
  const done=quests.filter(q=>q.claimed).length;
  document.getElementById('quests-card').innerHTML=`
    <h3>📜 Квесты (${done}/${quests.length} выполнено)</h3>
    <div class="quest-list">${quests.map(q=>{
      const ready=q.check&&!q.claimed;
      const isDone=q.claimed;
      return `<div class="quest-item ${isDone?'done':''}" style="border-left-color:${isDone?'var(--green)':ready?'var(--gold)':'var(--border)'}">
        <div class="q-check ${isDone?'done':''}" ${ready?`onclick="claimQuest('${q.id}',${q.reward})" style="cursor:pointer;border-color:${ready?'var(--gold)':'var(--border)'};color:${ready?'var(--gold)':'transparent'}"`:''}>${isDone?'✓':ready?'!':'·'}</div>
        <div class="q-body"><div class="q-title">${q.title}</div><div class="q-sub">${q.desc}</div></div>
        <div class="q-reward">${isDone?'✅ Получено':ready?`🪙 +${q.reward}`:`🪙 ${q.reward}`}</div>
      </div>`;
    }).join('')}</div>
  `;
}
function claimQuest(id,reward){
  const g=GAME[currentUser];
  if(!g.questsDone) g.questsDone=[];
  if(g.questsDone.includes(id)) return;
  g.questsDone.push(id);
  g.history.push({date:new Date().toLocaleDateString('ru-RU'),desc:`Квест выполнен!`,amt:reward});
  recalc(currentUser); renderAll(); saveGame();
  toast(`Квест выполнен! +${reward} 🪙`,'success');
}

// ═══════════════════ TOAST ═══════════════════════════════════════
function toast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',2500);}

// ═══════════════════ INIT ════════════════════════════════════════
async function init(){
  await loadData();
  allNames().forEach(n=>ensureGD(n));
  if(currentUser&&allNames().includes(currentUser)){login(currentUser);}
  else{currentUser=null;localStorage.removeItem('game_user');renderLogin();}
  setInterval(async()=>{await loadData();if(currentUser)renderAll();},60000);
}
init();
</script>
</body>
