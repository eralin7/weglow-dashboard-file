<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WeGlow — AI Советник</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f1623;--ink2:#1e2840;--muted:#8896ae;--line:#e8ecf4;--line2:#f1f4f9;--bg:#f7f8fc;--white:#fff;--acc:#6366f1;--acc-l:#eef2ff;--green:#16a34a;--green-l:#dcfce7;--red:#dc2626;--red-l:#fde8e8;--yellow:#ca8a04;--yellow-l:#fefce8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.topbar{background:var(--ink2);color:#fff;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.top-logo{font-family:serif;font-size:18px;font-weight:700;}
.top-link{color:rgba(255,255,255,.65);text-decoration:none;font-size:13px;}
.top-link:hover{color:#fff;}
.wrap{max-width:760px;margin:0 auto;padding:36px 24px;}
.hdr{margin-bottom:28px;}
.hdr h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;}
.hdr p{font-size:13px;color:var(--muted);margin-top:5px;}

/* CONTROLS */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:28px;}
.sel{padding:9px 14px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;cursor:pointer;}
.sel:focus{border-color:var(--acc);}
.btn{padding:10px 28px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;}
.btn:hover{opacity:.88;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* RESULT */
.result{background:var(--white);border:1.5px solid var(--line);border-radius:14px;overflow:hidden;}
.result-hdr{background:linear-gradient(135deg,#1e2840,#2d3a5c);padding:14px 22px;display:flex;align-items:center;gap:10px;}
.result-hdr-title{font-size:14px;font-weight:700;color:#fff;}
.result-hdr-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.result-body{padding:24px;}

/* EMPTY */
.empty{text-align:center;padding:52px 24px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:6px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:14px;padding:48px;}
.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--muted);}

/* AI CONTENT */
.ai{font-size:14px;line-height:1.75;color:var(--ink);}
.ai h3{font-size:15px;font-weight:700;margin:22px 0 10px;display:flex;align-items:center;gap:7px;}
.ai h3:first-child{margin-top:0;}
.ai p{color:#4a5568;margin-bottom:10px;}
.ai ul{list-style:none;margin:6px 0 14px;}
.ai ul li{padding:7px 12px 7px 14px;margin-bottom:5px;border-radius:8px;font-size:13px;border-left:3px solid var(--line);background:var(--line2);}
.ai ul li.ok{background:var(--green-l);border-color:var(--green);}
.ai ul li.warn{background:var(--yellow-l);border-color:var(--yellow);}
.ai ul li.bad{background:var(--red-l);border-color:var(--red);}
.ai ul li.action{background:var(--acc-l);border-color:var(--acc);}
</style>
</head>
<body>

<div class="topbar">
  <span class="top-logo">WeGlow</span>
  <div style="display:flex;gap:18px">
    <a href="dashboard.html" class="top-link">&#8592; Дашборд</a>
    <a href="director.html" class="top-link">Директор</a>
  </div>
</div>

<div class="wrap">
  <div class="hdr">
    <h1>🤖 AI Советник</h1>
    <p>Анализирует ваши данные и даёт конкретный план действий</p>
  </div>

  <div class="controls">
    <select class="sel" id="period-sel">
      <option value="cur">Текущий месяц</option>
      <option value="prev">Прошлый месяц</option>
      <option value="both">Оба месяца</option>
    </select>
    <select class="sel" id="prod-sel">
      <option value="all">Все продукты</option>
      <option value="col">Коллаген</option>
      <option value="ummi">Ummi</option>
      <option value="coffee">Кофе</option>
    </select>
    <button class="btn" id="btn" onclick="run()">&#9889; Анализировать</button>
  </div>

  <div class="result">
    <div class="result-hdr">
      <div>
        <div class="result-hdr-title">🤖 Анализ бизнес-процессов</div>
        <div class="result-hdr-sub">Claude AI — читает ваши данные и даёт рекомендации</div>
      </div>
    </div>
    <div class="result-body" id="body">
      <div class="empty">
        <div class="empty-icon">📊</div>
        <div class="empty-title">Готов к анализу</div>
        <p>Выберите период и нажмите «Анализировать»</p>
      </div>
    </div>
  </div>
</div>

<script>
const ANTHROPIC_KEY = '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';
const SUPABASE_URL  = 'https://bdyakgmeibpdkisbiykt.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkeWFrZ21laWJwZGtpc2JpeWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTQzOTMsImV4cCI6MjA4Nzc5MDM5M30.nA187grJR6XFQRmTP6WOM-6-1dZK1EzYNNP2JH9aAMg';
const SB_H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const PROD_CFG = {
  col:   {name:'Коллаген',color:'#1a56db',raw:'Коллаген'},
  ummi:  {name:'Ummi',    color:'#0a7c5c',raw:'Ummi'},
  coffee:{name:'Кофе',    color:'#b45309',raw:'Кофе'},
};
const MN = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

function fmt(n){return (Math.round(n||0)).toLocaleString('ru-RU');}
function fmtM(n){if(!n&&n!==0)return'—';const v=Math.round(n);if(Math.abs(v)>=1e6)return(v/1e6).toFixed(1)+' М ₸';if(Math.abs(v)>=1e3)return Math.round(v/1e3)+'К ₸';return v+' ₸';}
async function sbGet(url){const r=await fetch(url,{headers:SB_H});if(!r.ok)throw new Error(r.status);return r.json();}

function getMonthKey(offset=0){
  const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);
  return `${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function getDates(mk){
  const [mm,yy]=mk.split('.');
  const now=new Date(); const curMK=getMonthKey(0);
  const last=mk===curMK?now.getDate():new Date(+yy,+mm,0).getDate();
  const dates=[];
  for(let d=1;d<=last;d++) dates.push(`${String(d).padStart(2,'0')}.${mm}.${yy}`);
  return dates;
}
function totalDaysInMonth(mk){const[mm,yy]=mk.split('.');return new Date(+yy,+mm,0).getDate();}

function aggregateMK(raw,ad,plans,mk){
  const dates=new Set(getDates(mk));
  const now=new Date(); const curMK=getMonthKey(0);
  const isCur=mk===curMK;
  const passedDays=isCur?now.getDate():totalDaysInMonth(mk);
  const totalDays=totalDaysInMonth(mk);
  let tL=0,tD=0,tB=0,tA=0,tPlan=0;
  const byProd={};
  for(const[pk,cfg]of Object.entries(PROD_CFG)){
    const r=raw[cfg.raw]||{},a=ad[cfg.raw]||{};
    let l=0,d=0,b=0,a2=0;
    for(const[dt,v]of Object.entries(r)){if(dates.has(dt)){l+=v[0]||0;d+=v[1]||0;b+=v[2]||0;}}
    for(const[dt,v]of Object.entries(a)){if(dates.has(dt))a2+=v||0;}
    const plan=plans[mk]?.[pk]||0;
    const planToday=plan&&isCur?Math.round(plan/totalDays*passedDays):plan;
    byProd[pk]={leads:l,deals:d,budget:Math.round(b),ad:Math.round(a2),plan,planToday,
      conv:l>0?+(d/l*100).toFixed(1):0,avgCheck:d>0?Math.round(b/d):0,
      pct:plan>0?Math.round(b/plan*100):0,
      execPct:planToday>0?Math.round(b/planToday*100):0,
      drr:b>0?+(a2/b*100).toFixed(1):0,
      roi:a2>0?Math.round((b-a2)/a2*100):null,
      cpl:l>0?Math.round(a2/l):0};
    tL+=l;tD+=d;tB+=Math.round(b);tA+=Math.round(a2);tPlan+=plan;
  }
  const tPT=isCur?Math.round(tPlan/totalDays*passedDays):tPlan;
  byProd.total={leads:tL,deals:tD,budget:tB,ad:tA,plan:tPlan,planToday:tPT,
    passedDays,totalDays,isCur,
    conv:tL>0?+(tD/tL*100).toFixed(1):0,avgCheck:tD>0?Math.round(tB/tD):0,
    pct:tPlan>0?Math.round(tB/tPlan*100):0,
    execPct:tPT>0?Math.round(tB/tPT*100):0,
    drr:tB>0?+(tA/tB*100).toFixed(1):0,
    roi:tA>0?Math.round((tB-tA)/tA*100):null,
    cpl:tL>0?Math.round(tA/tL):0};
  return byProd;
}

function buildPrompt(curAgg,prevAgg,curMK,prevMK,prodFilter){
  const[cmm,cyy]=curMK.split('.');
  const[pmm,pyy]=prevMK.split('.');
  const curLbl=`${MN[+cmm-1]} ${cyy}`, prevLbl=`${MN[+pmm-1]} ${pyy}`;
  const prodName=prodFilter==='all'?'все продукты':PROD_CFG[prodFilter].name;

  const ser=(agg,mk)=>{
    const[mm,yy]=mk.split('.');
    const lbl=`${MN[+mm-1]} ${yy}`;
    const keys=prodFilter==='all'?Object.keys(PROD_CFG):[prodFilter];
    let t=`\n=== ${lbl} ===\n`;
    if(prodFilter==='all'){
      const x=agg.total;
      t+=`ИТОГО: выручка ${fmtM(x.budget)}, план ${fmtM(x.plan)}, план до сег. ${fmtM(x.planToday)}, выполнение ${x.execPct}%\n`;
      t+=`лиды ${x.leads}, сделки ${x.deals}, конв. ${x.conv}%, ср.чек ${fmt(x.avgCheck)} ₸, реклама ${fmtM(x.ad)}, ДРР ${x.drr}%, ROI ${x.roi!=null?x.roi+'%':'—'}, CPL ${x.cpl?fmt(x.cpl)+' ₸':'—'}\n`;
    }
    for(const k of keys){
      const d=agg[k];
      t+=`${PROD_CFG[k].name}: выручка ${fmtM(d.budget)}, план ${fmtM(d.plan)}, до сег. ${fmtM(d.planToday)}, вып. ${d.execPct}%, лиды ${d.leads}, сделки ${d.deals}, конв. ${d.conv}%, ср.чек ${fmt(d.avgCheck)} ₸, реклама ${fmtM(d.ad)}, ДРР ${d.drr}%, ROI ${d.roi!=null?d.roi+'%':'—'}, CPL ${d.cpl?fmt(d.cpl)+' ₸':'—'}\n`;
    }
    return t;
  };

  let data=ser(curAgg,curMK);
  if(prevAgg) data+=ser(prevAgg,prevMK);

  return `Ты — опытный бизнес-аналитик компании WeGlow (продажа БАДов: Коллаген, Ummi, Кофе). Анализируй данные и давай КОНКРЕТНЫЕ рекомендации.

ДАННЫЕ (${prodName}):${data}
Сегодня: ${new Date().toLocaleDateString('ru-RU')}, прошло ${curAgg.total.passedDays} из ${curAgg.total.totalDays} дней ${curLbl}.
Нормы: конверсия ≥12%, ДРР ≤15% отлично / ≤25% норма, ср.чек ≥80К ₸.

Дай анализ строго в этом формате (только HTML-теги, без markdown):

<h3>🎯 Текущая ситуация</h3>
<p>1-2 предложения: как дела в целом</p>

<h3>✅ Что работает</h3>
<ul>
<li class="ok">факт с цифрами</li>
</ul>

<h3>⚠️ Проблемные зоны</h3>
<ul>
<li class="bad">проблема с цифрами</li>
<li class="warn">менее критичная зона</li>
</ul>

<h3>💡 Нужно ли больше рекламы?</h3>
<p>Конкретный ответ с обоснованием через ДРР, ROI, CPL.</p>

<h3>🔧 Где теряются деньги</h3>
<ul>
<li class="bad">место потери + сумма в ₸</li>
</ul>

<h3>📋 План на 7 дней</h3>
<ul>
<li class="action">День 1-2: конкретное действие</li>
<li class="action">День 3-4: следующий шаг</li>
<li class="action">День 5-7: итог</li>
</ul>

<h3>📈 Прогноз на конец месяца</h3>
<p>Ожидаемая выручка и % от плана при текущей динамике.</p>

Только конкретные цифры, никаких общих фраз.`;
}

async function run(){
  const btn=document.getElementById('btn');
  const body=document.getElementById('body');
  const period=document.getElementById('period-sel').value;
  const prod=document.getElementById('prod-sel').value;

  btn.disabled=true;
  btn.innerHTML='<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Загрузка...';
  body.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Загружаю данные из Supabase...</div></div>';

  try{
    const[dataRows,planRows]=await Promise.all([
      sbGet(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data`),
      sbGet(`${SUPABASE_URL}/rest/v1/weglow_plans?select=month,col,ummi,coffee`),
    ]);
    const raw=dataRows[0]?.data?.RAW||{};
    const ad=dataRows[0]?.data?.AD_SPEND||{};
    const plans={};
    for(const r of planRows) plans[r.month]={col:r.col||0,ummi:r.ummi||0,coffee:r.coffee||0};

    const curMK=getMonthKey(0), prevMK=getMonthKey(-1);
    const curAgg=aggregateMK(raw,ad,plans,curMK);
    const prevAgg=aggregateMK(raw,ad,plans,prevMK);
    const usePrev=period==='prev'||period==='both';
    const prompt=buildPrompt(curAgg,usePrev?prevAgg:null,curMK,prevMK,prod);

    body.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">AI анализирует данные...</div></div>';
    btn.innerHTML='<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> AI думает...';

    const aiRes=await fetch('https://purple-moon-c773.eralin097.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    if(!aiRes.ok){
      const err=await aiRes.json().catch(()=>({error:{message:aiRes.statusText}}));
      throw new Error(err?.error?.message||'HTTP '+aiRes.status);
    }
    const aiData=await aiRes.json();
    const aiText=aiData.text||'Нет ответа';
    body.innerHTML=`<div class="ai">${aiText}</div>`;

  }catch(e){
    body.innerHTML=`<div style="color:#dc2626;padding:16px">⚠ Ошибка: ${e.message}</div>`;
  }finally{
    btn.disabled=false;
    btn.innerHTML='&#9889; Анализировать снова';
  }
}
</script>
</body>
</html>
