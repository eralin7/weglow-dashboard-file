<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>WeGlow — Race to Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;color:#e2e8f0;font-family:'DM Sans',sans-serif;}
body.hide-cursor{cursor:none;}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:linear-gradient(135deg,#0f1629,#1a1f3a);border-bottom:1px solid rgba(255,255,255,.06);}
.header h1{font-family:'Playfair Display',serif;font-size:32px;color:#fff;letter-spacing:1px;}
.header h1 span{color:#f59e0b;}
.header .updated{font-size:14px;color:#64748b;}

/* ── Race Section ── */
.race-section{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 40px 10px;gap:16px;}

.track{display:grid;grid-template-columns:180px 1fr 200px;align-items:center;height:80px;background:rgba(255,255,255,.03);border-radius:16px;padding:0 24px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.05);}
.track.leader{border-color:rgba(245,158,11,.3);box-shadow:0 0 20px rgba(245,158,11,.08);}
.track.leader .rop-name{color:#f59e0b !important;}

.rop-name{font-size:20px;font-weight:700;white-space:nowrap;}
.rop-rank{font-size:14px;color:#64748b;font-weight:400;}

.track-bar{position:relative;height:40px;border-radius:10px;background:rgba(255,255,255,.04);overflow:visible;}
.track-fill{height:100%;border-radius:10px;transition:width 2s cubic-bezier(.4,0,.2,1);position:relative;min-width:30px;}

.car-icon{position:absolute;top:50%;transform:translateY(-50%);right:-18px;font-size:32px;filter:drop-shadow(0 0 6px rgba(255,255,255,.3));transition:right 2s cubic-bezier(.4,0,.2,1);}

.finish-line{position:absolute;right:0;top:0;bottom:0;width:3px;background:repeating-linear-gradient(180deg,#fff 0,#fff 4px,#333 4px,#333 8px);opacity:.3;}

.rop-stats{text-align:right;font-size:15px;line-height:1.5;}
.rop-pct{font-size:26px;font-weight:700;}
.rop-sum{color:#94a3b8;font-size:14px;}

.track.overplan{border-color:rgba(16,185,129,.4);box-shadow:0 0 25px rgba(16,185,129,.12);}
.track.overplan .rop-pct{color:#10b981 !important;}

@keyframes pulse-leader{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.08);}50%{box-shadow:0 0 35px rgba(245,158,11,.2);}}
.track.leader{animation:pulse-leader 2s infinite;}

/* ── Bottom Panel ── */
.bottom-panel{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:10px 40px 20px;height:36%;}

.panel-card{background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px 24px;overflow:hidden;}
.panel-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px;color:#f8fafc;display:flex;align-items:center;gap:10px;}

/* Top 3 */
.top3-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;margin-bottom:8px;background:rgba(255,255,255,.02);}
.top3-item:first-child{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);}
.top3-rank{font-size:28px;width:40px;text-align:center;}
.top3-name{font-size:18px;font-weight:600;flex:1;}
.top3-val{text-align:right;}
.top3-budget{font-size:20px;font-weight:700;color:#f59e0b;}
.top3-deals{font-size:13px;color:#64748b;}

/* Live feed */
.live-feed{display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.feed-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.02);animation:feedIn .6s ease;}
.feed-item.big-deal{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);}
.feed-name{font-weight:600;font-size:16px;flex:1;}
.feed-amount{font-size:18px;font-weight:700;color:#10b981;}
.feed-amount.big{color:#f59e0b;}
.feed-crm{font-size:12px;color:#64748b;background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;}

@keyframes feedIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

.main{display:flex;flex-direction:column;height:100vh;}
</style>
</head>
<body>
<div class="main">
  <div class="header">
    <h1><span>RACE</span> TO PLAN</h1>
    <div class="updated" id="updatedAt">Loading...</div>
  </div>
  <div class="race-section" id="raceSection"></div>
  <div class="bottom-panel">
    <div class="panel-card">
      <div class="panel-title">TOP-3 TODAY</div>
      <div id="top3Container"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">LIVE DEALS</div>
      <div class="live-feed" id="liveFeed"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════ CONFIG ══════════════════════════════════════
const SUPABASE_URL = 'https://bdyakgmeibpdkisbiykt.supabase.co';
let SUPABASE_KEY = null;
function _initKey() {
  const _e = 'Ej54A1s/FC59AnMxIj17WncRPjR7BWtNFAR7XXATBx9kKHNBWSJLIUkbRApbJFAyDSNqKVEhGgFIMWoxBA5cIVUiHg4EIlQyHCJlLUsiRXZeCm4yAB11H0kbRQ1CDm4MRw5bHFAbGn5BMWoxQQ5fLUwaRXNbJ3oyBx5qOlA3HQIBJUMxDgpmOkM3IwpBIlQuQyRxIg81HQYGJUMbQgp2Jgw1RHccBXhJT3BVGXMqQR90OmsVIxcEPHY1WnEfWl0iPHZ3EWA2ORcAIXFBFgZ/DA==';
  const _x = 'wG2k9x';
  const r = atob(_e); let o = '';
  for (let i = 0; i < r.length; i++) o += String.fromCharCode(r.charCodeAt(i) ^ _x.charCodeAt(i % _x.length));
  SUPABASE_KEY = o;
}

// ═══════════════════ GLOBALS ════════════════════════════════════
let RAW = {}, MANAGERS = {}, MGR_TO_ROP = {}, ROP_PLANS = {}, AD_SPEND = {};

const ROP_COLORS = {
  'РОП Айдана':      '#3b82f6',
  'РОП Аслиддин':    '#f59e0b',
  'РОП Нурдаулет':   '#10b981',
  'РОП Диас KIDS':   '#ec4899',
  'РОП Айдана KIDS': '#8b5cf6',
  'БОТА AI':         '#06b6d4',
  'РОП Ербол':       '#ef4444',
};

const ROP_CRM_MAP = {
  'РОП Айдана':      ['Коллаген'],
  'РОП Аслиддин':    ['Коллаген'],
  'РОП Нурдаулет':   ['Коллаген'],
  'РОП Ербол':       ['Ербол'],
  'РОП Айдана KIDS': ['Ummi'],
  'РОП Диас KIDS':   ['Ummi'],
  'БОТА AI':         ['Коллаген'],
};

const RACE_ROPS = ['РОП Айдана','РОП Аслиддин','РОП Нурдаулет','РОП Диас KIDS','РОП Айдана KIDS','БОТА AI'];

// ═══════════════════ HELPERS ════════════════════════════════════
const parseDate = s => { const [d,m,y]=s.split('.'); return new Date(+y,+m-1,+d); };
const fmtDate = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
const fmtMoney = v => {
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return v.toString();
};

function getDatesInRange(from, to) {
  const res = []; let cur = parseDate(from); const end = parseDate(to);
  while (cur <= end) { res.push(fmtDate(cur)); cur = new Date(cur.getTime() + 86400000); }
  return res;
}

const _ropCache = {};
function getRop(mgrName) {
  if (_ropCache[mgrName] !== undefined) return _ropCache[mgrName];
  if (MGR_TO_ROP[mgrName]) { _ropCache[mgrName] = MGR_TO_ROP[mgrName]; return _ropCache[mgrName]; }
  const lower = mgrName.toLowerCase();
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    if (k.toLowerCase() === lower) { _ropCache[mgrName] = v; return v; }
  }
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    const kl = k.toLowerCase();
    if (lower.startsWith(kl) || kl.startsWith(lower)) { _ropCache[mgrName] = v; return v; }
  }
  const pinMatch = lower.match(/^п[иі]н\s*(\d+)/i);
  if (pinMatch) {
    const pinNum = pinMatch[1];
    for (const [k,v] of Object.entries(MGR_TO_ROP)) {
      const km = k.toLowerCase().match(/^п[иі]н\s*(\d+)/i);
      if (km && km[1] === pinNum) { _ropCache[mgrName] = v; return v; }
    }
  }
  _ropCache[mgrName] = '';
  return '';
}

function ropMatches(mgrName, targetRop) {
  if (targetRop === 'РОП Ербол') return true;
  if (targetRop === 'БОТА AI') return mgrName === 'БОТА AI';
  const mgrRop = getRop(mgrName);
  if (mgrRop === targetRop) return true;
  if (targetRop.endsWith(' KIDS')) return mgrRop === targetRop.replace(' KIDS', '');
  return false;
}

function aggregateManagersByPeriod(prodKey, from, to) {
  const allMgrs = (MANAGERS[prodKey] || []);
  const dates = new Set(getDatesInRange(from, to));
  return allMgrs.map(m => {
    if (m.daily && Object.keys(m.daily).length > 0) {
      let leads=0, deals=0, budget=0;
      for (const [d, v] of Object.entries(m.daily)) {
        if (dates.has(d)) { leads += v[0]||0; deals += v[1]||0; budget += v[2]||0; }
      }
      return { name: m.name, leads, deals, budget: Math.round(budget) };
    }
    return { name: m.name, leads: 0, deals: 0, budget: 0 };
  }).filter(m => m.leads > 0 || m.deals > 0 || m.budget > 0)
    .sort((a,b) => b.budget - a.budget);
}

// ═══════════════════ DATA LOAD ══════════════════════════════════
let _prevFeedKeys = new Set();

async function loadData() {
  if (!SUPABASE_KEY) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data,updated_at`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(res.status);
    const rows = await res.json();
    if (!rows || !rows[0] || !rows[0].data) return;
    const d = rows[0].data;

    if (d.RAW) RAW = d.RAW;
    if (d.MANAGERS) MANAGERS = d.MANAGERS;
    if (d.MGR_TO_ROP) {
      MGR_TO_ROP = {};
      for (const [k,v] of Object.entries(d.MGR_TO_ROP)) {
        if (!k.includes('\ufffd') && !v.includes('\ufffd')) MGR_TO_ROP[k] = v;
      }
    }
    if (d.ROP_PLANS) {
      ROP_PLANS = {};
      for (const [k,v] of Object.entries(d.ROP_PLANS)) {
        if (!k.includes('\ufffd')) ROP_PLANS[k] = v;
      }
    }
    if (d.AD_SPEND) AD_SPEND = d.AD_SPEND;

    // Merge archives
    if (d.ARCHIVE_RAW) {
      for (const [acc, daily] of Object.entries(d.ARCHIVE_RAW)) {
        if (!RAW[acc]) RAW[acc] = {};
        for (const [date, vals] of Object.entries(daily)) RAW[acc][date] = vals;
      }
    }
    if (d.ARCHIVE_MANAGERS) {
      for (const [acc, archMgrs] of Object.entries(d.ARCHIVE_MANAGERS)) {
        if (!MANAGERS[acc]) MANAGERS[acc] = [];
        const liveMap = {};
        MANAGERS[acc].forEach(m => { liveMap[m.name.toLowerCase()] = m; });
        for (const am of archMgrs) {
          const match = liveMap[am.name.toLowerCase()];
          if (match) {
            if (!match.daily) match.daily = {};
            for (const [date, vals] of Object.entries(am.daily || {})) {
              if (!match.daily[date]) match.daily[date] = vals;
            }
            let tl=0,td=0,tb=0;
            for (const vals of Object.values(match.daily)) { tl+=vals[0]||0; td+=vals[1]||0; tb+=vals[2]||0; }
            match.leads=tl; match.deals=td; match.budget=tb;
          } else {
            MANAGERS[acc].push(am);
            liveMap[am.name.toLowerCase()] = am;
          }
        }
      }
    }

    Object.keys(_ropCache).forEach(k => delete _ropCache[k]);

    const ts = rows[0].updated_at || d.updatedAt;
    if (ts) {
      const dt = new Date(ts);
      document.getElementById('updatedAt').textContent =
        dt.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}) + '  ' +
        dt.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    }

    render();
  } catch(e) {
    console.error('[TV] Load error:', e);
  }
}

// ═══════════════════ RENDER ═════════════════════════════════════
function render() { renderRace(); renderTop3(); renderFeed(); }

function getCurrentMonthKey() {
  const now = new Date();
  return `${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
}

function getMonthRange() {
  const now = new Date();
  const from = `01.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const to = fmtDate(now);
  return { from, to };
}

function renderRace() {
  const mk = getCurrentMonthKey();
  const { from, to } = getMonthRange();
  const container = document.getElementById('raceSection');

  const ropsData = [];
  for (const ropName of RACE_ROPS) {
    const plan = ROP_PLANS[ropName]?.[mk] || 0;
    if (plan <= 0) continue;

    const crms = ROP_CRM_MAP[ropName] || [];
    let fact = 0;
    crms.forEach(crm => {
      const mgrs = aggregateManagersByPeriod(crm, from, to);
      mgrs.filter(m => ropMatches(m.name, ropName)).forEach(m => { fact += m.budget; });
    });

    const pct = plan > 0 ? fact / plan * 100 : 0;
    const color = ROP_COLORS[ropName] || '#6366f1';
    const shortName = ropName.replace(/^РОП\s+/, '');
    ropsData.push({ ropName, shortName, fact, plan, pct, color });
  }

  ropsData.sort((a,b) => b.pct - a.pct);

  container.innerHTML = ropsData.map((r, i) => {
    const barPct = Math.min(r.pct, 120);
    const isLeader = i === 0;
    const isOver = r.pct >= 100;
    const cls = ['track'];
    if (isLeader) cls.push('leader');
    if (isOver) cls.push('overplan');

    return `
      <div class="${cls.join(' ')}">
        <div>
          <div class="rop-name" style="color:${r.color}">${r.shortName}</div>
          <div class="rop-rank">#${i+1}</div>
        </div>
        <div class="track-bar">
          <div class="track-fill" style="width:${barPct}%;background:linear-gradient(90deg,${r.color}22,${r.color});">
            <span class="car-icon">${isOver ? '🏆' : '🏎'}</span>
          </div>
          <div class="finish-line"></div>
        </div>
        <div class="rop-stats">
          <div class="rop-pct" style="color:${r.color}">${r.pct.toFixed(0)}%</div>
          <div class="rop-sum">${fmtMoney(r.fact)} / ${fmtMoney(r.plan)}</div>
        </div>
      </div>`;
  }).join('');
}

function renderTop3() {
  const today = fmtDate(new Date());
  const container = document.getElementById('top3Container');
  const ranks = ['🥇','🥈','🥉'];

  let allMgrs = [];
  for (const crm of Object.keys(MANAGERS)) {
    const mgrs = aggregateManagersByPeriod(crm, today, today);
    mgrs.forEach(m => {
      if (!allMgrs.find(x => x.name === m.name)) allMgrs.push(m);
    });
  }
  allMgrs.sort((a,b) => b.budget - a.budget);
  const top3 = allMgrs.filter(m => m.budget > 0).slice(0, 3);

  if (!top3.length) {
    container.innerHTML = '<div style="color:#64748b;text-align:center;padding:30px;">No deals today yet</div>';
    return;
  }

  container.innerHTML = top3.map((m, i) => `
    <div class="top3-item">
      <div class="top3-rank">${ranks[i] || (i+1)}</div>
      <div class="top3-name">${m.name}</div>
      <div class="top3-val">
        <div class="top3-budget">${fmtMoney(m.budget)}</div>
        <div class="top3-deals">${m.deals} deals</div>
      </div>
    </div>
  `).join('');
}

function renderFeed() {
  const today = fmtDate(new Date());
  const container = document.getElementById('liveFeed');

  let feedItems = [];
  for (const [crm, mgrs] of Object.entries(MANAGERS)) {
    for (const m of mgrs) {
      if (m.daily && m.daily[today]) {
        const v = m.daily[today];
        const budget = v[2] || 0;
        const deals = v[1] || 0;
        if (budget > 0) feedItems.push({ name: m.name, budget, deals, crm });
      }
    }
  }

  feedItems.sort((a,b) => b.budget - a.budget);
  feedItems = feedItems.slice(0, 7);

  const newKeys = new Set(feedItems.map(f => f.name + f.budget));
  const isNew = k => !_prevFeedKeys.has(k);

  container.innerHTML = feedItems.map(f => {
    const key = f.name + f.budget;
    const big = f.budget >= 100000;
    const cls = ['feed-item'];
    if (big) cls.push('big-deal');
    return `
      <div class="${cls.join(' ')}" ${isNew(key) ? 'style="animation:feedIn .6s ease"' : ''}>
        <span class="feed-name">${f.name}</span>
        <span class="feed-crm">${f.crm}</span>
        <span class="feed-amount ${big ? 'big' : ''}">${fmtMoney(f.budget)}</span>
      </div>`;
  }).join('');

  _prevFeedKeys = newKeys;
}

// ═══════════════════ INIT ═══════════════════════════════════════
_initKey();
loadData();
setInterval(loadData, 60000);

let _cursorTimer;
document.addEventListener('mousemove', () => {
  document.body.classList.remove('hide-cursor');
  clearTimeout(_cursorTimer);
  _cursorTimer = setTimeout(() => document.body.classList.add('hide-cursor'), 3000);
});
_cursorTimer = setTimeout(() => document.body.classList.add('hide-cursor'), 3000);
</script>
</body>
</html>
