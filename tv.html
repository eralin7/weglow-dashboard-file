<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — Гонка к Плану</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(180deg, #87CEEB 0%, #c5e8f7 15%, #e8f4fd 35%, #ffffff 100%);
  color:#1a1a2e;
  min-height:100vh;
  overflow:hidden;
  cursor:none;
}
body.cursor-visible{cursor:default;}

/* ══════════════════════════════════════════════════════
   SKY & CLOUDS
   ══════════════════════════════════════════════════════ */
.sky-bg{
  position:fixed;top:0;left:0;right:0;height:120px;z-index:0;
  pointer-events:none;
  background:linear-gradient(180deg, #7ec8e3 0%, #b5dff5 40%, #dceefb 100%);
  overflow:hidden;
}
.cloud{
  position:absolute;
  background:#fff;
  border-radius:50%;
  opacity:.7;
  filter:blur(1px);
}
.cloud::before,.cloud::after{
  content:'';position:absolute;background:#fff;border-radius:50%;
}
.cloud-1{width:120px;height:36px;top:20px;left:5%;animation:cloudDrift 60s linear infinite;}
.cloud-1::before{width:60px;height:40px;top:-18px;left:20px;}
.cloud-1::after{width:80px;height:44px;top:-22px;left:50px;}
.cloud-2{width:90px;height:28px;top:45px;left:35%;animation:cloudDrift 80s linear infinite;opacity:.5;}
.cloud-2::before{width:50px;height:32px;top:-14px;left:15px;}
.cloud-2::after{width:60px;height:36px;top:-16px;left:40px;}
.cloud-3{width:100px;height:30px;top:15px;left:70%;animation:cloudDrift 70s linear infinite;opacity:.6;}
.cloud-3::before{width:55px;height:35px;top:-16px;left:18px;}
.cloud-3::after{width:70px;height:40px;top:-20px;left:45px;}
@keyframes cloudDrift{
  0%{transform:translateX(0);}
  100%{transform:translateX(calc(100vw + 200px));}
}

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
.page{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════ */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:60px;flex-shrink:0;
  background:rgba(255,255,255,.92);
  border-bottom:1px solid rgba(0,0,0,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 2px 12px rgba(0,0,0,.04);
}
.header-title{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#1a1a2e;
}
.header-month{
  font-family:'Playfair Display',serif;font-size:18px;font-weight:600;
  color:#6b7280;letter-spacing:1px;
}
.header-right{display:flex;align-items:center;gap:16px;}
.header-clock{
  font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:2px;
  color:#1a1a2e;
}
.header-badge{
  font-size:11px;padding:5px 14px;border-radius:20px;
  background:rgba(16,185,129,.08);
  border:1px solid rgba(16,185,129,.15);
  color:#059669;font-weight:600;
}

/* ══════════════════════════════════════════════════════
   3D RACE SECTION — THE TRACK
   ══════════════════════════════════════════════════════ */
.race-section{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:10px 40px 10px;min-height:0;
  perspective:1200px;
}

/* Grass above track */
.grass-top{
  height:24px;
  border-radius:12px 12px 0 0;
  background:linear-gradient(180deg, #4ade80, #22c55e);
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 -2px 6px rgba(0,0,0,.15);
}
.grass-top::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,
    rgba(0,0,0,.03) 0, rgba(0,0,0,.03) 2px,
    transparent 2px, transparent 12px);
}

/* Track container with 3D perspective */
.track-container{
  transform:perspective(1000px) rotateX(6deg);
  transform-origin:center bottom;
  position:relative;
}

/* Track kerbs (top) */
.kerb-top{
  height:10px;
  background:repeating-linear-gradient(90deg,
    #dc2626 0, #dc2626 20px,
    #ffffff 20px, #ffffff 40px);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.15);
}

/* Track surface — asphalt */
.track-asphalt{
  background:linear-gradient(180deg, #3a3a3a 0%, #454545 50%, #3a3a3a 100%);
  padding:4px 0;
  position:relative;
  box-shadow:inset 0 4px 12px rgba(0,0,0,.3), inset 0 -4px 12px rgba(0,0,0,.3);
}
/* Asphalt noise texture */
.track-asphalt::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:100px 100px;
  pointer-events:none;
  opacity:.5;
}

/* Kerb bottom */
.kerb-bottom{
  height:10px;
  background:repeating-linear-gradient(90deg,
    #dc2626 0, #dc2626 20px,
    #ffffff 20px, #ffffff 40px);
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.15);
}

/* Grass below track */
.grass-bottom{
  height:20px;
  border-radius:0 0 12px 12px;
  background:linear-gradient(180deg, #22c55e, #16a34a);
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.15);
}
.grass-bottom::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,
    rgba(0,0,0,.03) 0, rgba(0,0,0,.03) 2px,
    transparent 2px, transparent 12px);
}

/* Individual lane */
.race-lane{
  display:grid;grid-template-columns:180px 1fr 180px;align-items:center;gap:0;
  height:72px;
  position:relative;
  border-bottom:2px dashed rgba(255,255,255,.2);
}
.race-lane:last-child{border-bottom:none;}

/* White lane markings on left/right edges */
.race-lane::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:#fff;opacity:.15;
}
.race-lane::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:4px;
  background:#fff;opacity:.15;
}

/* ── LEFT: ROP INFO (on track) ── */
.lane-info{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;z-index:3;
}
.lane-position{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:800;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.lane-position.pos-1{
  background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1200;
  animation:medalPulse 3s ease-in-out infinite;
}
.lane-position.pos-2{background:linear-gradient(135deg,#e0e0e0,#c0c0c0);color:#333;}
.lane-position.pos-3{background:linear-gradient(135deg,#cd7f32,#a0622e);color:#fff;}
.lane-position.pos-4{background:rgba(255,255,255,.2);color:rgba(255,255,255,.7);}
@keyframes medalPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,.4);}
  50%{box-shadow:0 0 20px rgba(255,215,0,.7);}
}
.lane-name{
  font-family:'Playfair Display',serif;font-size:18px;font-weight:700;
  color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
  white-space:nowrap;
}
.lane-mgr-count{
  font-size:10px;color:rgba(255,255,255,.5);font-weight:500;
  margin-left:42px;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}

/* ── CENTER: CAR AREA ── */
.lane-track-area{
  position:relative;height:100%;
  z-index:2;
}

/* ── CAR ── */
.car-wrap{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  transition:left 2s cubic-bezier(0.25, 1, 0.5, 1);
  z-index:3;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));
}
/* Dust/tire marks behind car */
.car-wrap::before{
  content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
  width:40px;height:10px;
  background:linear-gradient(90deg, transparent, rgba(150,150,150,.3), rgba(200,200,200,.1));
  border-radius:4px;
  filter:blur(3px);
  animation:dustFlicker .4s ease-in-out infinite alternate;
}
/* Speed lines */
.car-wrap::after{
  content:'';position:absolute;right:calc(100% + 6px);top:50%;transform:translateY(-50%);
  width:35px;height:14px;
  background:
    linear-gradient(0deg,
      transparent 0%, transparent 18%,
      rgba(255,255,255,.15) 18%, rgba(255,255,255,.15) 22%,
      transparent 22%, transparent 42%,
      rgba(255,255,255,.2) 42%, rgba(255,255,255,.2) 46%,
      transparent 46%, transparent 54%,
      rgba(255,255,255,.2) 54%, rgba(255,255,255,.2) 58%,
      transparent 58%, transparent 78%,
      rgba(255,255,255,.15) 78%, rgba(255,255,255,.15) 82%,
      transparent 82%);
  opacity:.7;
}
@keyframes dustFlicker{
  0%{width:30px;opacity:.5;}
  100%{width:45px;opacity:.8;}
}
/* Car shadow on asphalt */
.car-shadow{
  position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  width:70px;height:10px;background:rgba(0,0,0,.35);
  border-radius:50%;filter:blur(5px);
}

.car-wrap.leader-car{
  transform:translate(-50%,-50%) scale(1.12);
}
/* Leader crown */
.leader-crown{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:16px;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));
  animation:crownBounce 2s ease-in-out infinite;
}
@keyframes crownBounce{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-3px);}
}

.car-wrap.finished{
  filter:drop-shadow(0 0 12px #10b981) drop-shadow(0 0 24px #10b981) drop-shadow(0 3px 6px rgba(0,0,0,.5));
}

/* Finished text flash */
.plan-done-flash{
  position:absolute;top:50%;right:60px;transform:translateY(-50%);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#10b981;
  text-shadow:0 0 8px #10b981, 0 0 16px rgba(16,185,129,.5);
  animation:flashIn .6s ease-out forwards;
  z-index:5;
  white-space:nowrap;
  background:rgba(0,0,0,.4);
  padding:4px 10px;border-radius:6px;
}
@keyframes flashIn{
  0%{opacity:0;transform:translateY(-50%) scale(1.5);}
  60%{opacity:1;transform:translateY(-50%) scale(0.95);}
  100%{opacity:1;transform:translateY(-50%) scale(1);}
}

/* ── FINISH LINE ── */
.finish-line{
  position:absolute;right:0;top:0;bottom:0;width:20px;z-index:1;
  background:repeating-conic-gradient(#fff 0% 25%, #222 0% 50%) 0 0 / 10px 10px;
  opacity:.7;
}
.finish-label{
  position:absolute;right:4px;top:-22px;z-index:4;
  font-size:10px;font-weight:800;color:#1a1a2e;
  letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(255,255,255,.5);
}
.finish-flag{
  display:inline-block;
  animation:flagWave 1.5s ease-in-out infinite;
  transform-origin:bottom left;
  font-size:16px;
}
@keyframes flagWave{
  0%,100%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
}

/* ── RIGHT: STATS (on track) ── */
.lane-stats{
  text-align:right;display:flex;flex-direction:column;gap:2px;
  align-items:flex-end;padding-right:28px;z-index:3;
}
.lane-pct{
  font-family:'DM Sans',sans-serif;font-size:28px;font-weight:800;
  font-variant-numeric:tabular-nums;line-height:1;
  color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,.5);
  letter-spacing:-0.5px;
}
.lane-amounts{
  font-size:11px;color:rgba(255,255,255,.6);font-weight:500;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.lane-deals-row{display:flex;gap:4px;justify-content:flex-end;margin-top:2px;}
.lane-deal-badge{
  font-size:9px;padding:2px 7px;border-radius:8px;
  background:rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);font-weight:600;
  border:1px solid rgba(255,255,255,.1);
}

/* ══════════════════════════════════════════════════════
   SCOREBOARD (TV-style overlay)
   ══════════════════════════════════════════════════════ */
.scoreboard{
  position:absolute;top:16px;right:16px;z-index:10;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;
  padding:14px 18px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(0,0,0,.05);
  min-width:220px;
}
.scoreboard-title{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.scoreboard-live{
  width:6px;height:6px;border-radius:50%;background:#ef4444;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.sb-row{
  display:flex;align-items:center;gap:10px;
  padding:5px 0;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.sb-row:last-child{border-bottom:none;}
.sb-pos{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
}
.sb-pos.p1{background:#ffd700;color:#1a1200;}
.sb-pos.p2{background:#c0c0c0;color:#333;}
.sb-pos.p3{background:#cd7f32;color:#fff;}
.sb-pos.p4{background:#e5e7eb;color:#6b7280;}
.sb-name{flex:1;font-size:12px;font-weight:600;color:#1a1a2e;}
.sb-pct{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;}
.sb-detail{font-size:9px;color:#9ca3af;font-weight:500;}

/* ══════════════════════════════════════════════════════
   CONFETTI / EXPLOSION
   ══════════════════════════════════════════════════════ */
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(80px) rotate(720deg) scale(0);opacity:0;}
}
.confetti-particle{
  position:absolute;border-radius:50%;
  animation:confetti-fall 1.8s ease-out forwards;
  pointer-events:none;z-index:10;
}
@keyframes neonBurst{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(3);opacity:0;}
}
.neon-burst{
  position:absolute;width:40px;height:40px;border-radius:50%;
  border:2px solid #10b981;pointer-events:none;z-index:9;
  animation:neonBurst .8s ease-out forwards;
  box-shadow:0 0 20px #10b981;
}

/* ══════════════════════════════════════════════════════
   BOTTOM PANEL (light cards)
   ══════════════════════════════════════════════════════ */
.bottom-panel{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  padding:8px 40px 20px;flex-shrink:0;
}
.panel-card{
  background:#fff;
  border-radius:16px;padding:18px 22px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.04);
}
.panel-title{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.panel-title-dot{
  width:7px;height:7px;border-radius:50%;
  background:#10b981;
  box-shadow:0 0 6px #10b981;
  animation:livePulse 2s ease-in-out infinite;
}
.panel-title-dot.red{background:#ef4444;box-shadow:0 0 6px #ef4444;}

/* ── TOP-3 MANAGERS ── */
.top3-list{display:flex;flex-direction:column;gap:8px;}
.top3-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;border-radius:12px;
  background:#fafafa;
  transition:all .4s;
  position:relative;overflow:hidden;
}
.top3-item.gold{
  background:linear-gradient(135deg, #fffbeb, #fef3c7);
  border-left:4px solid #fbbf24;
}
.top3-item.silver{
  background:linear-gradient(135deg, #f9fafb, #f3f4f6);
  border-left:4px solid #c0c0c0;
}
.top3-item.bronze{
  background:linear-gradient(135deg, #fdf8f0, #fde7cb);
  border-left:4px solid #cd7f32;
}
.top3-medal{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
.top3-info{flex:1;min-width:0;}
.top3-name{font-size:15px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-sub{font-size:11px;color:#9ca3af;margin-top:3px;}
.top3-amount{
  font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;
  font-variant-numeric:tabular-nums;white-space:nowrap;
  letter-spacing:-0.3px;
}
.top3-amount.gold-text{color:#d97706;}
.top3-amount.silver-text{color:#6b7280;}
.top3-amount.bronze-text{color:#a0622e;}

/* ── FEED ── */
.feed-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow:hidden;}
.feed-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:10px;
  background:#fafafa;
  font-size:13px;font-weight:500;
  animation:feedSlideIn .6s cubic-bezier(.4,0,.2,1);
  transition:all .3s;
}
.feed-item.highlight{
  background:linear-gradient(135deg, #ecfdf5, #d1fae5);
  border:1px solid rgba(16,185,129,.15);
}
@keyframes feedSlideIn{
  from{opacity:0;transform:translateX(-30px) scale(.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.feed-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#6b7280;}
.feed-amount{
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  font-variant-numeric:tabular-nums;white-space:nowrap;color:#1a1a2e;
}
.feed-tag{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;
  background:rgba(99,102,241,.08);
  border:1px solid rgba(99,102,241,.1);
  color:#6366f1;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;
}
.feed-empty{
  text-align:center;padding:24px;color:#9ca3af;font-size:13px;
}

/* ══════════════════════════════════════════════════════
   LOADING
   ══════════════════════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, #e8f4fd, #ffffff);flex-direction:column;gap:20px;
}
.loading-spinner{
  width:44px;height:44px;border:3px solid rgba(99,102,241,.12);
  border-top-color:rgba(99,102,241,.7);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#9ca3af;letter-spacing:1px;}

/* ══════════════════════════════════════════════════════
   3D CAR IMAGE
   ══════════════════════════════════════════════════════ */
.car-3d-img{
  display:block;
  width:80px;
  height:40px;
  object-fit:contain;
  pointer-events:none;
  image-rendering:auto;
}

/* ══════════════════════════════════════════════════════
   WHEEL SPIN
   ══════════════════════════════════════════════════════ */
@keyframes wheelSpin{
  to{transform:rotate(360deg);}
}
.wheel-spin{
  animation:wheelSpin .3s linear infinite;
  transform-origin:center;
}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════ */
@media(max-width:1400px){
  .header{padding:0 24px;height:54px;}
  .header-title{font-size:18px;}
  .header-clock{font-size:22px;}
  .race-section{padding:8px 24px 8px;}
  .race-lane{grid-template-columns:150px 1fr 150px;}
  .lane-name{font-size:16px;}
  .lane-pct{font-size:24px;}
  .bottom-panel{padding:6px 24px 14px;gap:16px;}
}
@media(max-width:1024px){
  .race-lane{grid-template-columns:130px 1fr 130px;}
  .lane-name{font-size:14px;}
  .lane-pct{font-size:20px;}

<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const CAR_RENDER_W = 240;
const CAR_RENDER_H = 120;

const ROP_CAR_COLORS = {
  'РОП Айдана':    '#1a56db',
  'РОП Аслиддин':  '#f59e0b',
  'РОП Нурдаулет': '#10b981',
  'РОП Диас':      '#ef4444',
};

function renderCarToCanvas(objData, textureImg) {
  const scene = new THREE.Scene();
  scene.background = null; // transparent

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(3, 5, 4);
  dirLight.castShadow = true;
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  // Apply texture to model
  const texture = new THREE.Texture(textureImg);
  texture.needsUpdate = true;
  texture.flipY = false;
  texture.colorSpace = THREE.SRGBColorSpace;

  const model = objData.clone(true);
  model.traverse((child) => {
    if (child.isMesh) {
      child.material = new THREE.MeshStandardMaterial({
        map: texture,
        metalness: 0.3,
        roughness: 0.5,
      });
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  scene.add(model);

  // Compute bounding box to center and size the model
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.sub(center);

  // Slight rotation for dynamic racing look
  model.rotation.y = -Math.PI / 2 + 0.15; // side view, slightly angled
  model.rotation.x = 0.05; // tiny tilt forward

  // Camera — orthographic for consistent side view
  const maxDim = Math.max(size.x, size.y, size.z);
  const aspect = CAR_RENDER_W / CAR_RENDER_H;
  const frustumH = maxDim * 0.6;
  const frustumW = frustumH * aspect;
  const camera = new THREE.OrthographicCamera(
    -frustumW, frustumW, frustumH, -frustumH, 0.01, maxDim * 10
  );
  camera.position.set(0, maxDim * 0.15, maxDim * 2);
  camera.lookAt(0, 0, 0);

  // Shadow plane
  const planeGeo = new THREE.PlaneGeometry(maxDim * 4, maxDim * 4);
  const planeMat = new THREE.ShadowMaterial({ opacity: 0.35 });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.y = -size.y / 2;
  plane.receiveShadow = true;
  scene.add(plane);

  // Renderer
  const renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true,
    preserveDrawingBuffer: true,
  });
  renderer.setSize(CAR_RENDER_W, CAR_RENDER_H);
  renderer.setPixelRatio(1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  renderer.render(scene, camera);

  // Get the base (untinted) image data
  const baseDataURL = renderer.domElement.toDataURL('image/png');

  renderer.dispose();
  return baseDataURL;
}

function tintImage(baseDataURL, hexColor) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = CAR_RENDER_W;
      c.height = CAR_RENDER_H;
      const ctx = c.getContext('2d');

      // Draw original car
      ctx.drawImage(img, 0, 0);

      // Apply color tint using 'multiply' blend mode
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = hexColor;
      ctx.fillRect(0, 0, c.width, c.height);

      // Restore alpha from original (multiply kills transparency)
      ctx.globalCompositeOperation = 'destination-in';
      ctx.drawImage(img, 0, 0);

      // Lighten to avoid too dark — overlay the original at 30% opacity
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.3;
      ctx.drawImage(img, 0, 0);
      ctx.globalAlpha = 1.0;

      // Restore alpha again
      ctx.globalCompositeOperation = 'destination-in';
      ctx.drawImage(img, 0, 0);

      resolve(c.toDataURL('image/png'));
    };
    img.src = baseDataURL;
  });
}

async function init3DCars() {
  try {
    // Load texture
    const textureImg = await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = 'assets/car_texture.png';
    });

    // Load OBJ
    const loader = new OBJLoader();
    const objData = await new Promise((resolve, reject) => {
      loader.load('assets/car.obj', resolve, undefined, reject);
    });

    // Render base car (untinted) to canvas
    const baseDataURL = renderCarToCanvas(objData, textureImg);

    // Create tinted versions for each ROP
    const carImages = {};
    for (const [ropName, color] of Object.entries(ROP_CAR_COLORS)) {
      carImages[ropName] = await tintImage(baseDataURL, color);
    }

    // Store globally for the main script to use
    window.__3dCarImages = carImages;
    window.__3dCarBase = baseDataURL;
    window.__3dCarsReady = true;

    console.log('[3D Cars] Pre-rendered successfully');

    // Re-render race lanes to swap SVG for 3D images
    if (typeof renderRace === 'function') {
      // Force full re-build of lanes
      const container = document.getElementById('raceTracks');
      if (container) {
        const lanes = container.querySelectorAll('.race-lane');
        lanes.forEach(l => l.remove());
        renderRace();
      }
    }
  } catch (err) {
    console.warn('[3D Cars] Failed to load, using SVG fallback:', err);
    window.__3dCarsReady = false;
  }
}

init3DCars();
</script>

function getDatesInRange(from, to) {
  const res = []; let cur = parseDate(from); const end = parseDate(to);
  while (cur <= end) { res.push(fmtDate(cur)); cur = new Date(cur.getTime() + 86400000); }
  return res;
}

function getRop(mgrName) {
  if (_ropCache[mgrName] !== undefined) return _ropCache[mgrName];
  if (MGR_TO_ROP[mgrName]) { _ropCache[mgrName] = MGR_TO_ROP[mgrName]; return _ropCache[mgrName]; }
  const lower = mgrName.toLowerCase();
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    if (k.toLowerCase() === lower) { _ropCache[mgrName] = v; return v; }
  }
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    const kl = k.toLowerCase();
    if (lower.startsWith(kl) || kl.startsWith(lower)) { _ropCache[mgrName] = v; return v; }
  }
  const pinMatch = lower.match(/^п[иі]н\s*(\d+)/i);
  if (pinMatch) {
    const pinNum = pinMatch[1];
    for (const [k,v] of Object.entries(MGR_TO_ROP)) {
      const km = k.toLowerCase().match(/^п[иі]н\s*(\d+)/i);
      if (km && km[1] === pinNum) { _ropCache[mgrName] = v; return v; }
    }
  }
  _ropCache[mgrName] = '';
  return '';
}
function clearRopCache() { Object.keys(_ropCache).forEach(k => delete _ropCache[k]); }

function aggregateManagersByPeriod(prodKey, from, to) {

// ═══════════════════ RACE CALCULATION ═══════════════════════════════
function calcRopData() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const monthFrom = `01.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthTo = `${String(lastDay).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthKey = `${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;

  const results = [];
  for (const [ropName, crms] of Object.entries(ROP_CRM_MAP)) {
    let fact=0, leads=0, deals=0, mgrCount=0;
    const mgrSet = new Set();
    crms.forEach(crm => {
      const mgrs = aggregateManagersByPeriod(crm, monthFrom, monthTo);
      mgrs.filter(m => getRop(m.name) === ropName).forEach(m => {
        fact += m.budget||0; leads += m.leads||0; deals += m.deals||0;
        mgrSet.add(m.name);
      });
    });
    mgrCount = mgrSet.size;
    const plan = (ROP_PLANS[ropName] && ROP_PLANS[ropName][monthKey]) || 0;
    const pct = plan > 0 ? (fact / plan * 100) : 0;
    results.push({ name: ropName, fact, plan, pct, leads, deals, mgrCount, color: ROP_COLORS[ropName] });
  }
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

// ═══════════════════ TOP-3 & FEED ═══════════════════════════════════
function getTodayManagers() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allMgrs = [];
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];

  allCrms.forEach(crm => {
    const mgrs = aggregateManagersByPeriod(crm, todayStr, todayStr);
    mgrs.forEach(m => {
      allMgrs.push({ ...m, crm });
    });
  });
  return allMgrs;
}

function calcTop3() {
  const mgrs = getTodayManagers();
  const map = {};
  mgrs.forEach(m => {
    if (!map[m.name] || map[m.name].budget < m.budget) {
      map[m.name] = m;
    } else {
      map[m.name].budget += m.budget;
      map[m.name].deals += m.deals;
    }
  });
  return Object.values(map).sort((a,b) => b.budget - a.budget).slice(0, 3);
}

function calcFeed() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  const entries = [];

  allCrms.forEach(crm => {
    const mgrList = MANAGERS[crm] || [];
    mgrList.forEach(m => {
      if (m.daily && m.daily[todayStr]) {
        const v = m.daily[todayStr];
        const budget = v[2] || 0;
        if (budget > 0) {
          entries.push({ name: m.name, budget, deals: v[1]||0, crm });
        }
      }
    });
  });

  entries.sort((a,b) => b.budget - a.budget);
  return entries.slice(0, 7);
}

function renderRace() {

      </div>
    `).join('');
    lanes = container.querySelectorAll('.race-lane');
  }

  // Update scoreboard
  renderScoreboard(data);

        const lane = lanes[i];

        lane.querySelector('.lane-mgr-count').textContent = r.mgrCount + ' менеджеров';

        // Animate car
        const pctClamped = Math.min(r.pct, 100);
        const car = lane.querySelector('.car-wrap');
        const carLeft = Math.max(5, pctClamped * 0.92 + 3);
        car.style.left = carLeft + '%';
        car.style.color = r.color;

        // Leader car styling
        const isLeader = (i === 0);
        let crownEl = car.querySelector('.leader-crown');
        if (isLeader) {
          car.classList.add('leader-car');
          if (!crownEl) {
            crownEl = document.createElement('div');
            crownEl.className = 'leader-crown';
            crownEl.innerHTML = '&#x1F451;';
            car.prepend(crownEl);
          }
        } else {
          car.classList.remove('leader-car');
          if (crownEl) crownEl.remove();
        }

        if (r.pct >= 100) {
          car.classList.add('finished');
        } else {
          car.classList.remove('finished');
        }

        // Plan done flash
        const trackArea = lane.querySelector('.lane-track-area');
        const existingFlash = trackArea.querySelector('.plan-done-flash');
        if (r.pct >= 100 && !existingFlash) {
          const flash = document.createElement('div');
          flash.className = 'plan-done-flash';
          flash.textContent = 'ПЛАН ВЫПОЛНЕН!';
          trackArea.appendChild(flash);
        } else if (r.pct < 100 && existingFlash) {
          existingFlash.remove();
        }

        // Right stats
        lane.querySelector('.lane-pct').textContent = r.pct.toFixed(1) + '%';
        lane.querySelector('.lane-pct').style.color = r.color;
        lane.querySelector('.lane-amounts').textContent = fmtM(r.fact) + ' / ' + fmtM(r.plan);

        // Update deal badges
        const dealRow = lane.querySelector('.lane-deals-row');
        if (dealRow) {
          dealRow.innerHTML = `
            <span class="lane-deal-badge">${r.leads} лидов</span>
            <span class="lane-deal-badge">${r.deals} сделок</span>
          `;
        }

        // Confetti on crossing 100%
        if (r.pct >= 100 && !prevFinished.has(r.name)) {
          prevFinished.add(r.name);
          spawnConfetti(lane);
        }
      });
    }, 50);
  });
}

function renderScoreboard(data) {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = `
    <div class="scoreboard-title"><span class="scoreboard-live"></span> ТАБЛИЦА ЛИДЕРОВ</div>
    ${data.map((r, i) => `
      <div class="sb-row">
        <div class="sb-pos p${i+1}">${i+1}</div>
        <div class="sb-name" style="color:${r.color}">${r.name.replace('РОП ','')}</div>
        <div>
          <div class="sb-pct" style="color:${r.color}">${r.pct.toFixed(1)}%</div>
          <div class="sb-detail">${fmtM(r.fact)}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderTop3() {
  const top3 = calcTop3();
  const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
  const classes = ['gold', 'silver', 'bronze'];
  const textClasses = ['gold-text', 'silver-text', 'bronze-text'];
  const el = document.getElementById('top3List');

  if (top3.length === 0) {
    el.innerHTML = '<div class="feed-empty">Нет данных за сегодня</div>';
    return;
  }

  el.innerHTML = top3.map((m, i) => `
    <div class="top3-item ${classes[i] || ''}">
      <div class="top3-medal">${medals[i] || ''}</div>
      <div class="top3-info">
        <div class="top3-name">${m.name}</div>
        <div class="top3-sub">${m.deals} сделок</div>
      </div>
      <div class="top3-amount ${textClasses[i] || ''}">${fmtM(m.budget)}</div>
    </div>
  `).join('');
}

function renderFeed() {
  const feed = calcFeed();
  const el = document.getElementById('feedList');

  if (feed.length === 0) {
    el.innerHTML = '<div class="feed-empty">Нет сделок за сегодня</div>';
    return;
  }

  const newKeys = new Set(feed.map(f => f.name + ':' + f.budget));

  el.innerHTML = feed.map(f => {
    const isNew = !prevFeedKeys.has(f.name + ':' + f.budget);
    const isHighlight = f.budget >= 100000;
    return `
      <div class="feed-item ${isHighlight ? 'highlight' : ''}" ${isNew ? '' : 'style="animation:none"'}>
        <div class="feed-name">${f.name}</div>
        <div class="feed-amount" ${isHighlight ? 'style="color:#059669"' : ''}>${fmtM(f.budget)}</div>
        <div class="feed-tag">${f.crm}</div>
      </div>
    `;
  }).join('');

  prevFeedKeys = newKeys;
}

function renderAll() {
  renderRace();
  renderTop3();
  renderFeed();
}

// ═══════════════════ HEADER ═══════════════════════════════════════
function updateHeader() {
  const now = new Date();
  document.getElementById('headerMonth').textContent =
    MONTH_NAMES[now.getMonth()].toUpperCase() + ' ' + now.getFullYear();
  document.getElementById('headerClock').textContent =
    now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ═══════════════════ DATA LOADING ═══════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data,updated_at`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      const d = rows[0].data;
      if (d.RAW)        RAW = d.RAW;
      if (d.MANAGERS)   MANAGERS = d.MANAGERS;
      if (d.MGR_TO_ROP && Object.keys(d.MGR_TO_ROP).length > 0) {
        MGR_TO_ROP = d.MGR_TO_ROP;
        clearRopCache();
      }
      if (d.ROP_PLANS)  ROP_PLANS = d.ROP_PLANS;

      if (rows[0].updated_at) {
        const dt = new Date(rows[0].updated_at);
        document.getElementById('headerBadge').textContent =
          'Обновлено: ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      }
    }
    return true;
  } catch(e) {
    console.warn('Supabase load error:', e);
    return false;
  }
}

// ═══════════════════ CURSOR AUTO-HIDE ═══════════════════════════════
let cursorTimer;
function resetCursor() {
  document.body.classList.add('cursor-visible');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => {
    document.body.classList.remove('cursor-visible');
  }, 3000);
}
document.addEventListener('mousemove', resetCursor);
document.addEventListener('mousedown', resetCursor);

// ═══════════════════ INIT ═══════════════════════════════════════
async function init() {
  updateHeader();
  setInterval(updateHeader, 1000);

  const ok = await loadData();
  if (ok) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page').style.display = 'flex';
    renderAll();
  } else {
    document.querySelector('.loading-text').textContent = 'Ошибка загрузки данных. Повтор...';
    setTimeout(init, 5000);
    return;
  }

  // Auto-reload every 60s
  setInterval(async () => {
    await loadData();
    renderAll();
  }, 60000);
}

init();
</script>
