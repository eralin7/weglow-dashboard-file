<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — Гонка к Плану</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}
body{
  font-family:'DM Sans',sans-serif;
  background:#000;
  color:#1a1a2e;
  min-height:100vh;
  overflow:hidden;
}

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
.page{display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════════════════════
   3D SCENE CONTAINER (top 70%)
   ══════════════════════════════════════════════════════ */
.scene-container{
  position:relative;
  flex:7;
  min-height:0;
  overflow:hidden;
}
.scene-container canvas{
  display:block;
  width:100%!important;
  height:100%!important;
}

/* ══════════════════════════════════════════════════════
   HUD OVERLAY
   ══════════════════════════════════════════════════════ */
.hud{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:10;
}
.hud *{pointer-events:auto;}

/* Title bar (top-left) */
.hud-title-bar{
  position:absolute;top:16px;left:16px;
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;
  padding:12px 20px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(0,0,0,.05);
}
.hud-main-title{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#1a1a2e;
}
.hud-clock{
  font-family:'DM Sans',sans-serif;font-size:24px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:2px;
  color:#1a1a2e;
}
.hud-badge{
  font-size:11px;padding:5px 14px;border-radius:20px;
  background:rgba(16,185,129,.08);
  border:1px solid rgba(16,185,129,.15);
  color:#059669;font-weight:600;
}

/* Scoreboard (top-right) */
.scoreboard{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;
  padding:14px 18px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(0,0,0,.05);
  min-width:260px;
}
.scoreboard-title{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.scoreboard-live{
  width:6px;height:6px;border-radius:50%;background:#ef4444;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.sb-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 0;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.sb-row:last-child{border-bottom:none;}
.sb-pos{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
}
.sb-pos.p1{background:#ffd700;color:#1a1200;}
.sb-pos.p2{background:#c0c0c0;color:#333;}
.sb-pos.p3{background:#cd7f32;color:#fff;}
.sb-pos.p4{background:#e5e7eb;color:#6b7280;}
.sb-name{flex:1;font-size:13px;font-weight:600;color:#1a1a2e;}
.sb-pct{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;}
.sb-detail{font-size:9px;color:#9ca3af;font-weight:500;}

/* Car labels floating in 3D (rendered as HTML) */
.car-label{
  position:absolute;
  transform:translate(-50%,-100%);
  white-space:nowrap;
  pointer-events:none;
  transition:opacity .3s;
  z-index:11;
}
.car-label-name{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:900;
  letter-spacing:1px;
  text-shadow:0 2px 6px rgba(0,0,0,.7), 0 0 20px currentColor, 0 0 40px currentColor;
  -webkit-text-stroke:0.5px rgba(0,0,0,.3);
}
.car-label-pct{ display:none; }
.car-label-detail{ display:none; }

/* Zoom hint */
.zoom-hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  color:#fff;
  padding:8px 20px;
  border-radius:20px;
  font-size:12px;font-weight:500;
  letter-spacing:0.5px;
  transition:opacity 1s;
}
.zoom-hint.hidden{opacity:0;pointer-events:none;}

/* ══════════════════════════════════════════════════════
   BOTTOM PANEL (30%)
   ══════════════════════════════════════════════════════ */
.bottom-panel{
  flex:3;
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  padding:12px 40px 20px;
  background:linear-gradient(180deg, #f8fafc, #ffffff);
  border-top:1px solid rgba(0,0,0,.06);
  min-height:0;
  overflow:hidden;
}
.panel-card{
  background:#fff;
  border-radius:16px;padding:16px 20px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.04);
  display:flex;flex-direction:column;
  min-height:0;
}
.panel-title{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.panel-title-dot{
  width:7px;height:7px;border-radius:50%;
  background:#10b981;
  box-shadow:0 0 6px #10b981;
  animation:livePulse 2s ease-in-out infinite;
}
.panel-title-dot.red{background:#ef4444;box-shadow:0 0 6px #ef4444;}

/* ── TOP-3 MANAGERS ── */
.top3-list{display:flex;flex-direction:column;gap:8px;overflow:hidden;flex:1;}
.top3-item{
  display:flex;align-items:center;gap:14px;
  padding:10px 14px;border-radius:12px;
  background:#fafafa;
  transition:all .4s;
  position:relative;overflow:hidden;
}
.top3-item.gold{
  background:linear-gradient(135deg, #fffbeb, #fef3c7);
  border-left:4px solid #fbbf24;
}
.top3-item.silver{
  background:linear-gradient(135deg, #f9fafb, #f3f4f6);
  border-left:4px solid #c0c0c0;
}
.top3-item.bronze{
  background:linear-gradient(135deg, #fdf8f0, #fde7cb);
  border-left:4px solid #cd7f32;
}
.top3-medal{font-size:26px;flex-shrink:0;width:32px;text-align:center;}
.top3-info{flex:1;min-width:0;}
.top3-name{font-size:14px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.top3-amount{
  font-family:'DM Sans',sans-serif;font-size:18px;font-weight:800;
  font-variant-numeric:tabular-nums;white-space:nowrap;
  letter-spacing:-0.3px;
}
.top3-amount.gold-text{color:#d97706;}
.top3-amount.silver-text{color:#6b7280;}
.top3-amount.bronze-text{color:#a0622e;}

/* ── FEED ── */
.feed-list{display:flex;flex-direction:column;gap:6px;overflow:hidden;flex:1;}
.feed-item{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px;border-radius:10px;
  background:#fafafa;
  font-size:13px;font-weight:500;
  animation:feedSlideIn .6s cubic-bezier(.4,0,.2,1);
  transition:all .3s;
}
.feed-item.highlight{
  background:linear-gradient(135deg, #ecfdf5, #d1fae5);
  border:1px solid rgba(16,185,129,.15);
}
@keyframes feedSlideIn{
  from{opacity:0;transform:translateX(-30px) scale(.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.feed-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#6b7280;}
.feed-amount{
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  font-variant-numeric:tabular-nums;white-space:nowrap;color:#1a1a2e;
}
.feed-tag{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;
  background:rgba(99,102,241,.08);
  border:1px solid rgba(99,102,241,.1);
  color:#6366f1;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;
}
.feed-empty{
  text-align:center;padding:24px;color:#9ca3af;font-size:13px;
}

/* ══════════════════════════════════════════════════════
   LOADING
   ══════════════════════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, #87CEEB 0%, #c5e8f7 40%, #ffffff 100%);
  flex-direction:column;gap:20px;
  transition:opacity .8s;
}
.loading-screen.fade-out{opacity:0;pointer-events:none;}
.loading-bar-container{
  width:300px;height:6px;border-radius:3px;
  background:rgba(0,0,0,.1);overflow:hidden;
}
.loading-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg, #6366f1, #10b981);
  border-radius:3px;
  transition:width .3s;
}
.loading-text{font-size:13px;color:#6b7280;letter-spacing:1px;}
.loading-title{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:800;
  letter-spacing:3px;color:#1a1a2e;
}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════ */
@media(max-width:1400px){
  .bottom-panel{padding:10px 24px 14px;gap:16px;}
  .hud-main-title{font-size:17px;}
  .hud-clock{font-size:20px;}
}
@media(max-width:1024px){
  .bottom-panel{grid-template-columns:1fr;}
  .scoreboard{display:none;}
}
@media(max-width:768px){
  .bottom-panel{padding:8px 16px 12px;}
  .hud-title-bar{padding:8px 14px;}
  .hud-main-title{font-size:14px;}
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",

  }
}

<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading">
  <div class="loading-title">ГОНКА К ПЛАНУ</div>
  <div class="loading-bar-container">
    <div class="loading-bar" id="loadingBar"></div>

</div>

      <div class="scoreboard" id="scoreboard"></div>

      <div id="carLabelsContainer"></div>

      <div class="zoom-hint" id="zoomHint">Колёсико мыши — масштаб | Перетаскивание — поворот</div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">

    </div>
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-dot red"></span> Live-лента сделок</div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>
</div>

<!-- 3D SCENE + DATA LOGIC -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════ CONFIG ═══════════════════════════════════════
const SUPABASE_URL = 'https://bdyakgmeibpdkisbiykt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkeWFrZ21laWJwZGtpc2JpeWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTQzOTMsImV4cCI6MjA4Nzc5MDM5M30.nA187grJR6XFQRmTP6WOM-6-1dZK1EzYNNP2JH9aAMg';

const ROP_CRM_MAP = {
  'РОП Айдана': ['Коллаген', 'Ummi'],
  'РОП Аслиддин': ['Коллаген'],
  'РОП Нурдаулет': ['Коллаген'],
  'РОП Диас': ['Ummi'],
};
const ROP_COLORS = {
  'РОП Айдана': '#1a56db',
  'РОП Аслиддин': '#f59e0b',
  'РОП Нурдаулет': '#10b981',
  'РОП Диас': '#ef4444',
};
const MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// ═══════════════════ STRAIGHT TRACK CONFIG (LONGER: 120) ═══════════
const roadLength = 120;
const roadWidth = 12;
const laneWidth = 3;
const startX = -roadLength / 2 + 2;
const endX = roadLength / 2 - 3;
const trackRange = endX - startX;

// Lane Z positions (4 lanes)
const lanePositions = [
  -roadWidth/2 + laneWidth * 0.5,
  -roadWidth/2 + laneWidth * 1.5,
  -roadWidth/2 + laneWidth * 2.5,
  -roadWidth/2 + laneWidth * 3.5,
];

// ═══════════════════ 3D CAR CONFIG ═══════════════════════════════
const ROP_CARS = {
  'РОП Айдана':    { color: 0x1a56db, mesh: null, targetPos: null, targetRot: 0 },
  'РОП Аслиддин':  { color: 0xf59e0b, mesh: null, targetPos: null, targetRot: 0 },
  'РОП Нурдаулет': { color: 0x10b981, mesh: null, targetPos: null, targetRot: 0 },
  'РОП Диас':      { color: 0xef4444, mesh: null, targetPos: null, targetRot: 0 },
};

// ═══════════════════ DATA STATE ═══════════════════════════════════
let RAW = {}, MANAGERS = {}, ROP_PLANS = {}, MGR_TO_ROP = {};
const _ropCache = {};
let prevFeedKeys = new Set();
let prevFinished = new Set();

// ═══════════════════ UTILS ═══════════════════════════════════════
const parseDate = s => { const [d,m,y] = s.split('.'); return new Date(+y, +m-1, +d); };
const fmtDate = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
const fmt = n => Math.round(n).toLocaleString('ru-RU');
const fmtM = n => fmt(Math.round(n)) + ' \u20B8';
const getMonthKey = d => `${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;

function getDatesInRange(from, to) {
  const res = []; let cur = parseDate(from); const end = parseDate(to);
  while (cur <= end) { res.push(fmtDate(cur)); cur = new Date(cur.getTime() + 86400000); }
  return res;
}

function getRop(mgrName) {
  if (_ropCache[mgrName] !== undefined) return _ropCache[mgrName];
  if (MGR_TO_ROP[mgrName]) { _ropCache[mgrName] = MGR_TO_ROP[mgrName]; return _ropCache[mgrName]; }
  const lower = mgrName.toLowerCase();
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    if (k.toLowerCase() === lower) { _ropCache[mgrName] = v; return v; }
  }
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    const kl = k.toLowerCase();
    if (lower.startsWith(kl) || kl.startsWith(lower)) { _ropCache[mgrName] = v; return v; }
  }
  const pinMatch = lower.match(/^п[иі]н\s*(\d+)/i);
  if (pinMatch) {
    const pinNum = pinMatch[1];
    for (const [k,v] of Object.entries(MGR_TO_ROP)) {
      const km = k.toLowerCase().match(/^п[иі]н\s*(\d+)/i);
      if (km && km[1] === pinNum) { _ropCache[mgrName] = v; return v; }
    }
  }
  _ropCache[mgrName] = '';
  return '';
}
function clearRopCache() { Object.keys(_ropCache).forEach(k => delete _ropCache[k]); }

function aggregateManagersByPeriod(prodKey, from, to) {
  const allMgrs = MANAGERS[prodKey] || [];
  const dates = new Set(getDatesInRange(from, to));
  return allMgrs.map(m => {
    if (m.daily && Object.keys(m.daily).length > 0) {
      let leads=0, deals=0, budget=0;
      for (const [d, v] of Object.entries(m.daily)) {
        if (dates.has(d)) { leads += v[0]||0; deals += v[1]||0; budget += v[2]||0; }
      }
      return { name: m.name, leads, deals, budget: Math.round(budget) };
    }
    return { name: m.name, leads: m.leads||0, deals: m.deals||0, budget: m.budget||0 };
  }).filter(m => m.budget > 0 || m.leads > 0);
}

// ═══════════════════ RACE CALCULATION ═══════════════════════════════
function calcRopData() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const monthFrom = `01.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthTo = `${String(lastDay).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthKey = `${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;

  const results = [];
  for (const [ropName, crms] of Object.entries(ROP_CRM_MAP)) {
    let fact=0, leads=0, deals=0, mgrCount=0;
    const mgrSet = new Set();
    crms.forEach(crm => {
      const mgrs = aggregateManagersByPeriod(crm, monthFrom, monthTo);
      mgrs.filter(m => getRop(m.name) === ropName).forEach(m => {
        fact += m.budget||0; leads += m.leads||0; deals += m.deals||0;
        mgrSet.add(m.name);
      });
    });
    mgrCount = mgrSet.size;
    const plan = (ROP_PLANS[ropName] && ROP_PLANS[ropName][monthKey]) || 0;
    const pct = plan > 0 ? (fact / plan * 100) : 0;
    results.push({ name: ropName, fact, plan, pct, leads, deals, mgrCount, color: ROP_COLORS[ropName] });
  }
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

// ═══════════════════ TOP-3 & FEED ═══════════════════════════════════
function getTodayManagers() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allMgrs = [];
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  allCrms.forEach(crm => {
    const mgrs = aggregateManagersByPeriod(crm, todayStr, todayStr);
    mgrs.forEach(m => { allMgrs.push({ ...m, crm }); });
  });
  return allMgrs;
}

function calcTop3() {
  const mgrs = getTodayManagers();
  const map = {};
  mgrs.forEach(m => {
    if (!map[m.name] || map[m.name].budget < m.budget) {
      map[m.name] = m;
    } else {
      map[m.name].budget += m.budget;
      map[m.name].deals += m.deals;
    }
  });
  return Object.values(map).sort((a,b) => b.budget - a.budget).slice(0, 3);
}

function calcFeed() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  const entries = [];
  allCrms.forEach(crm => {
    const mgrList = MANAGERS[crm] || [];
    mgrList.forEach(m => {
      if (m.daily && m.daily[todayStr]) {
        const v = m.daily[todayStr];
        const budget = v[2] || 0;
        if (budget > 0) {
          entries.push({ name: m.name, budget, deals: v[1]||0, crm });
        }
      }
    });
  });
  entries.sort((a,b) => b.budget - a.budget);
  return entries.slice(0, 7);
}

// ═══════════════════ DATA LOADING ═══════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data,updated_at`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      const d = rows[0].data;
      if (d.RAW)        RAW = d.RAW;
      if (d.MANAGERS)   MANAGERS = d.MANAGERS;
      if (d.MGR_TO_ROP && Object.keys(d.MGR_TO_ROP).length > 0) {
        MGR_TO_ROP = d.MGR_TO_ROP;
        clearRopCache();
      }
      if (d.ROP_PLANS)  ROP_PLANS = d.ROP_PLANS;

      if (rows[0].updated_at) {
        const dt = new Date(rows[0].updated_at);
        document.getElementById('headerBadge').textContent =
          'Обновлено: ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      }
    }
    return true;
  } catch(e) {
    console.warn('Supabase load error:', e);
    return false;
  }
}

    const isNew = !prevFeedKeys.has(f.name + ':' + f.budget);

// ═══════════════════ GLB CAR LOADER ═══════════════════════════════

const CAR_FILES = {
  'РОП Айдана':    'assets/car1.glb',
  'РОП Аслиддин':  'assets/car2.glb',
  'РОП Нурдаулет': 'assets/car3.glb',
  'РОП Диас':      'assets/car4.glb',
};

async function loadCars() {
  const loader = new GLTFLoader();
  const promises = Object.entries(CAR_FILES).map(([ropName, file]) => {
    return new Promise((resolve) => {
      loader.load(file, (gltf) => {
        const car = gltf.scene;

        // Auto-scale to ~3 units long
        const box = new THREE.Box3().setFromObject(car);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 3 / maxDim;
        car.scale.set(scale, scale, scale);

        // Center the car
        box.setFromObject(car);
        const center = new THREE.Vector3();
        box.getCenter(center);
        car.position.sub(center);

        // Wrap in group for positioning
        const group = new THREE.Group();
        group.add(car);

        // Tint the car to ROP color while KEEPING original textures
        const color = new THREE.Color(ROP_COLORS[ropName]);
        car.traverse(child => {
          if (child.isMesh) {
            if (child.material) {
              child.material = child.material.clone();
              child.material.color.lerp(color, 0.5);
              child.material.metalness = Math.max(child.material.metalness || 0, 0.3);
            }
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        // Orient car to face right
        group.rotation.y = Math.PI / 2;

        scene.add(group);
        ROP_CARS[ropName].mesh = group;

        // Update loading progress for this car
        updateLoadProgress(ropName.replace('РОП ', '') + ' загружен');
        resolve();
      }, (progress) => {
        // Optional progress tracking
      }, (error) => {
        console.warn('Failed to load', file, error);
        updateLoadProgress('Ошибка: ' + file);
        resolve(); // Don't block on failure
      });
    });
  });

  await Promise.all(promises);
}

// ═══════════════════ VEGETATION ═══════════════════════════════════

function buildPineTree(x, z) {
  const group = new THREE.Group();
  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.2, 1.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  trunk.position.y = 0.75;
  group.add(trunk);
  // 3 cone layers
  [1.5, 2.2, 2.8].forEach((y, i) => {
    const size = 1.2 - i * 0.3;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(size, 1.2, 8),
      new THREE.MeshStandardMaterial({ color: 0x2d5a27 })
    );
    cone.position.y = y;
    cone.castShadow = true;
    group.add(cone);
  });
  group.position.set(x, 0, z);
  const s = 0.7 + Math.random() * 0.6;
  group.scale.set(s, s, s);
  return group;
}

function buildRoundTree(x, z) {
  const group = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, 2, 6),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  trunk.position.y = 1;
  group.add(trunk);
  const crown = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0x3a8a2e })
  );
  crown.position.y = 2.8;
  crown.castShadow = true;
  group.add(crown);
  group.position.set(x, 0, z);
  const s = 0.6 + Math.random() * 0.8;
  group.scale.set(s, s, s);
  return group;
}

function buildBush(x, z) {
  const group = new THREE.Group();
  const colors = [0x3a8a2e, 0x4ade80, 0x2d6a24];
  for (let i = 0; i < 3; i++) {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.4 + Math.random()*0.3, 6, 5),
      new THREE.MeshStandardMaterial({ color: colors[i % 3] })
    );
    sphere.position.set(Math.random()*0.5-0.25, 0.3+Math.random()*0.2, Math.random()*0.5-0.25);
    sphere.castShadow = true;
    group.add(sphere);
  }
  group.position.set(x, 0, z);
  return group;
}

// Seed random for consistent vegetation
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}
const vRand = seededRandom(42);

// Trees along both sides of the track
for (let x = -roadLength/2; x < roadLength/2; x += 4 + vRand() * 6) {
  // Near side (positive z)
  const z1 = roadWidth/2 + 3 + vRand() * 15;
  const treeType1 = vRand();
  if (treeType1 < 0.4) scene.add(buildPineTree(x, z1));
  else if (treeType1 < 0.8) scene.add(buildRoundTree(x, z1));
  else scene.add(buildBush(x, z1));

  // Far side (negative z)
  const z2 = -roadWidth/2 - 3 - vRand() * 15;
  const treeType2 = vRand();
  if (treeType2 < 0.4) scene.add(buildPineTree(x + vRand()*2, z2));
  else if (treeType2 < 0.8) scene.add(buildRoundTree(x + vRand()*2, z2));
  else scene.add(buildBush(x + vRand()*2, z2));
}

// Extra bushes closer to road edge
for (let x = -roadLength/2; x < roadLength/2; x += 6 + vRand() * 8) {
  scene.add(buildBush(x, roadWidth/2 + 1.5 + vRand()));
  scene.add(buildBush(x + 2, -roadWidth/2 - 1.5 - vRand()));
}

// ═══════════════════ SMALL ROCKS ═══════════════════════════════════
for (let i = 0; i < 40; i++) {
  const rx = -roadLength/2 + vRand() * roadLength;
  const side = vRand() < 0.5 ? 1 : -1;
  const rz = side * (roadWidth/2 + 2 + vRand() * 12);
  const rockSize = 0.15 + vRand() * 0.35;
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(rockSize, 0),
    new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 })
  );
  rock.position.set(rx, rockSize * 0.5, rz);
  rock.rotation.set(vRand()*Math.PI, vRand()*Math.PI, 0);
  rock.castShadow = true;
  scene.add(rock);
}

// ═══════════════════ FLOWERS ═══════════════════════════════════════
const flowerColors = [0xff69b4, 0xff4500, 0xffff00, 0xff1493, 0xffa500, 0xee82ee];
for (let i = 0; i < 60; i++) {
  const fx = -roadLength/2 + vRand() * roadLength;
  const side = vRand() < 0.5 ? 1 : -1;
  const fz = side * (roadWidth/2 + 1.5 + vRand() * 10);
  const flower = new THREE.Mesh(

// ═══════════════════ START/FINISH ARCHES ═══════════════════════════
function buildArch(x) {
  const group = new THREE.Group();
  const pillarGeo = new THREE.BoxGeometry(0.3, 5, 0.3);
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
  const leftPillar = new THREE.Mesh(pillarGeo, pillarMat);
  leftPillar.position.set(x, 2.5, -roadWidth/2 - 1);
  leftPillar.castShadow = true;
  group.add(leftPillar);
  const rightPillar = new THREE.Mesh(pillarGeo, pillarMat);
  rightPillar.position.set(x, 2.5, roadWidth/2 + 1);
  rightPillar.castShadow = true;
  group.add(rightPillar);
  const banner = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 1, roadWidth + 2.3),
    new THREE.MeshStandardMaterial({ color: 0xdc2626 })
  );
  banner.position.set(x, 5, 0);
  banner.castShadow = true;
  group.add(banner);
  return group;
}
scene.add(buildArch(roadLength/2 - 2));   // Finish arch
scene.add(buildArch(-roadLength/2 + 2));  // Start arch

// ═══════════════════ GRANDSTAND ═══════════════════════════════════
function buildGrandstand(x, z) {
  const group = new THREE.Group();
  for (let row = 0; row < 4; row++) {
    const step = new THREE.Mesh(
      new THREE.BoxGeometry(8, 0.5, 1.5),

    step.position.set(x, row * 0.6, z + row * 1.5);

scene.add(buildGrandstand(0, roadWidth/2 + 5));

// ═══════════════════ LOADING PROGRESS ═══════════════════════════════
let loadedCount = 0;
const totalLoads = 5; // 4 car GLB models + data
const loadingBar = document.getElementById('loadingBar');
const loadingText = document.getElementById('loadingText');

function updateLoadProgress(label) {
  loadedCount++;
  const pct = Math.round((loadedCount / totalLoads) * 100);
  loadingBar.style.width = pct + '%';
  loadingText.textContent = label;
}

let dataReady = false;

// Sorted lane assignment (updated when data refreshes)
let sortedRopNames = Object.keys(ROP_CARS);

// ═══════════════════ CAR POSITION UPDATE ═══════════════════════════
function updateCarPositions(ropData) {
  sortedRopNames = ropData.map(r => r.name);

  ropData.forEach((r, i) => {
    const config = ROP_CARS[r.name];
    if (!config || !config.mesh) return;
    const pct = Math.min(r.pct / 100, 1.2);
    const x = startX + pct * trackRange;
    const z = lanePositions[i] || lanePositions[0];
    config.targetPos = new THREE.Vector3(x, 0, z);
    config.targetRot = Math.PI / 2;
    config.pct = r.pct;
  });
}

// ═══════════════════ CAR LABELS (HTML over 3D) ═══════════════════
const carLabelsContainer = document.getElementById('carLabelsContainer');
let carLabelEls = {};

function createCarLabels() {
  carLabelsContainer.innerHTML = '';
  carLabelEls = {};
  for (const [ropName, config] of Object.entries(ROP_CARS)) {
    const label = document.createElement('div');
    label.className = 'car-label';
    label.style.color = ROP_COLORS[ropName];
    label.innerHTML = `
      <div class="car-label-name" style="color:${ROP_COLORS[ropName]}">${ropName.replace('РОП ','')}</div>
      <div class="car-label-pct" style="color:${ROP_COLORS[ropName]}">0%</div>
      <div class="car-label-detail">-- / --</div>
    `;
    carLabelsContainer.appendChild(label);
    carLabelEls[ropName] = label;
  }
}

function updateCarLabels(ropData) {
  for (const r of ropData) {
    const el = carLabelEls[r.name];
    if (!el) continue;
    el.querySelector('.car-label-pct').textContent = r.pct.toFixed(1) + '%';
    el.querySelector('.car-label-detail').textContent = fmtM(r.fact) + ' / ' + fmtM(r.plan);
  }
}

function projectCarLabels() {
  const rect = renderer.domElement.getBoundingClientRect();
  for (const [ropName, config] of Object.entries(ROP_CARS)) {
    if (!config.mesh || !carLabelEls[ropName]) continue;
    const pos = config.mesh.position.clone();
    pos.y += 2.5;
    pos.project(camera);

    const x = (pos.x * 0.5 + 0.5) * rect.width;
    const y = (-pos.y * 0.5 + 0.5) * rect.height;

    const label = carLabelEls[ropName];
    if (pos.z > 1) {
      label.style.opacity = '0';
    } else {
      label.style.opacity = '1';
      label.style.left = x + 'px';
      label.style.top = y + 'px';
    }
  }
}

// ═══════════════════ ANIMATION LOOP ═══════════════════════════════
function animate() {
  requestAnimationFrame(animate);

  // Smooth car movement
  for (const config of Object.values(ROP_CARS)) {
    if (config.mesh && config.targetPos) {
      config.mesh.position.lerp(config.targetPos, 0.02);
      config.mesh.rotation.y = THREE.MathUtils.lerp(
        config.mesh.rotation.y,
        config.targetRot,
        0.02
      );
    }
  }

  controls.update();
  renderer.render(scene, camera);
  projectCarLabels();
}

// ═══════════════════ RESIZE ═══════════════════════════════════════
function onResize() {
  const w = sceneContainer.clientWidth;
  const h = sceneContainer.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ═══════════════════ RENDER ALL ═══════════════════════════════════
function renderAll() {
  const data = calcRopData();
  updateCarPositions(data);
  updateCarLabels(data);
  renderScoreboard(data);
  renderTop3();
  renderFeed();
}

// ═══════════════════ ZOOM HINT FADE ═══════════════════════════════
setTimeout(() => {
  document.getElementById('zoomHint').classList.add('hidden');
}, 5000);

// ═══════════════════ INIT ═══════════════════════════════════════
async function init() {
  updateHeader();
  setInterval(updateHeader, 1000);

  // Load all 4 car GLB models (each updates progress individually)
  await loadCars();

  // Load data from Supabase
  const dataOk = await loadData();
  updateLoadProgress('Данные загружены');
  dataReady = dataOk;

  // Create labels
  createCarLabels();

  // Start animation loop
  animate();

  if (dataReady) {
    renderAll();
  }

  // Fade out loading, show page
  const loadingEl = document.getElementById('loading');
  loadingEl.classList.add('fade-out');
  document.getElementById('page').style.display = 'flex';
  requestAnimationFrame(() => {
    onResize();
    setTimeout(() => {
      loadingEl.style.display = 'none';
    }, 800);
  });

  // Handle data load failure
  if (!dataReady) {
    console.warn('Data failed to load, retrying in 5s...');
    setTimeout(async () => {
      const ok = await loadData();
      if (ok) renderAll();
    }, 5000);
  }

  // Auto-reload data every 60 seconds
  setInterval(async () => {
    await loadData();
    renderAll();
  }, 60000);
}

init();
