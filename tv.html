<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — Гонка к Плану</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(160deg, #050816 0%, #0a1628 40%, #0d0f24 100%);
  color:#fff;
  min-height:100vh;
  overflow:hidden;
  cursor:none;
}
body.cursor-visible{cursor:default;}

/* ══════════════════════════════════════════════════════
   ANIMATED PARTICLES / STARS
   ══════════════════════════════════════════════════════ */
#particles-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ══════════════════════════════════════════════════════
   CYBERPUNK GRID FLOOR (perspective)
   ══════════════════════════════════════════════════════ */
.cyber-grid{
  position:fixed;bottom:0;left:0;right:0;height:60vh;z-index:0;pointer-events:none;
  perspective:600px;overflow:hidden;
}
.cyber-grid-inner{
  position:absolute;bottom:-20%;left:-10%;right:-10%;height:140%;
  transform:rotateX(55deg);
  background:
    repeating-linear-gradient(90deg, rgba(99,102,241,0.06) 0, rgba(99,102,241,0.06) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(0deg, rgba(99,102,241,0.04) 0, rgba(99,102,241,0.04) 1px, transparent 1px, transparent 80px);
  animation:gridScroll 8s linear infinite;
}
@keyframes gridScroll{
  0%{background-position:0 0;}
  100%{background-position:0 80px;}
}

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
.page{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════ */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:60px;flex-shrink:0;
  background:linear-gradient(135deg, rgba(5,8,22,.95), rgba(10,22,40,.98));
  border-bottom:1px solid rgba(99,102,241,0.15);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.header-title{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(135deg,#fff,rgba(200,200,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-month{
  font-family:'Playfair Display',serif;font-size:18px;font-weight:600;
  opacity:.7;letter-spacing:1px;
}
.header-right{display:flex;align-items:center;gap:16px;}
.header-clock{
  font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:2px;
  color:rgba(255,255,255,.9);
}
.header-badge{
  font-size:11px;padding:5px 14px;border-radius:20px;
  background:rgba(99,102,241,.12);
  border:1px solid rgba(99,102,241,.2);
  color:rgba(255,255,255,.5);font-weight:500;
}

/* ══════════════════════════════════════════════════════
   3D RACE SECTION
   ══════════════════════════════════════════════════════ */
.race-section{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:20px 40px 16px;gap:12px;min-height:0;
  perspective:1200px;
}

/* ── INDIVIDUAL TRACK ── */
.race-track{
  display:grid;grid-template-columns:200px 1fr 190px;align-items:center;gap:16px;
  padding:14px 24px;border-radius:16px;
  position:relative;
  transform:perspective(800px) rotateX(1deg) rotateY(-0.5deg);
  transform-style:preserve-3d;
  background:linear-gradient(135deg, rgba(13,17,23,.85), rgba(15,20,35,.7));
  border:1px solid rgba(99,102,241,0.08);
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.race-track::before{
  content:'';position:absolute;inset:0;border-radius:16px;z-index:-1;
  background:linear-gradient(135deg, transparent, rgba(99,102,241,.03));
  pointer-events:none;
}
.race-track.leader{
  transform:perspective(800px) rotateX(1deg) rotateY(-0.5deg) scale(1.02);
  background:linear-gradient(135deg, rgba(13,17,23,.9), rgba(20,25,45,.8));
  border-color:rgba(255,255,255,.1);
  box-shadow:
    0 0 40px rgba(99,102,241,.06),
    0 8px 32px rgba(0,0,0,.3);
}

/* ── LEFT: ROP INFO ── */
.track-info{display:flex;flex-direction:column;gap:6px;}
.track-name-row{display:flex;align-items:center;gap:10px;}
.track-position{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:10px;font-size:14px;font-weight:800;
  flex-shrink:0;
}
.track-position.pos-1{
  background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1200;
  box-shadow:0 0 12px rgba(255,215,0,.3);
  animation:medalPulse 3s ease-in-out infinite;
}
.track-position.pos-2{
  background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#222;
  box-shadow:0 0 8px rgba(192,192,192,.2);
}
.track-position.pos-3{
  background:linear-gradient(135deg,#cd7f32,#a0622e);color:#1a1200;
  box-shadow:0 0 8px rgba(205,127,50,.2);
}
.track-position.pos-4{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);
}
@keyframes medalPulse{
  0%,100%{box-shadow:0 0 12px rgba(255,215,0,.3);}
  50%{box-shadow:0 0 20px rgba(255,215,0,.5);}
}
.track-rop{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  letter-spacing:0.5px;
  text-shadow:0 0 20px currentColor;
}
.track-meta{display:flex;align-items:center;gap:8px;margin-left:42px;}
.track-badge{
  font-size:10px;padding:3px 10px;border-radius:10px;
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;
}

/* ── CENTER: TRACK LANE (3D asphalt) ── */
.track-lane{
  position:relative;height:52px;border-radius:14px;overflow:visible;
  background:linear-gradient(180deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
  border:1px solid rgba(255,255,255,.04);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.4), inset 0 -1px 4px rgba(0,0,0,.2);
}
/* Lane dashed center line */
.track-lane::before{
  content:'';position:absolute;top:50%;left:10px;right:10px;height:2px;
  transform:translateY(-50%);
  background:repeating-linear-gradient(90deg,
    rgba(255,255,255,.12) 0, rgba(255,255,255,.12) 20px,
    transparent 20px, transparent 40px);
  border-radius:1px;
}
/* Neon side-glow (color set via JS inline style on data attribute) */
.track-lane::after{
  content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;
  box-shadow:
    inset 0 2px 8px var(--lane-color-glow, transparent),
    inset 0 -2px 8px var(--lane-color-glow, transparent);
  opacity:.35;
}

/* Progress bar fill */
.track-progress{
  position:absolute;left:0;top:0;height:100%;border-radius:14px;
  transition:width 2s cubic-bezier(0.34,1.56,0.64,1);min-width:4px;
  overflow:hidden;
}
.track-progress-inner{
  width:100%;height:100%;border-radius:14px;opacity:.15;
}
.track-progress-glow{
  position:absolute;top:0;right:0;width:60px;height:100%;
  border-radius:0 14px 14px 0;
  filter:blur(12px);opacity:.5;
}

/* Checkered finish line */
.finish-line{
  position:absolute;right:0;top:-1px;bottom:-1px;width:14px;z-index:1;
  background:
    repeating-conic-gradient(#fff 0% 25%, #333 0% 50%) 0 0 / 7px 7px;
  border-radius:0 14px 14px 0;
  opacity:.2;
  animation:finishShimmer 3s ease-in-out infinite;
}
@keyframes finishShimmer{
  0%,100%{opacity:.15;}
  50%{opacity:.3;}
}

/* ── CAR ── */
.car-wrap{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  transition:left 2s cubic-bezier(0.34,1.56,0.64,1);
  z-index:3;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
}
/* Exhaust trail */
.car-wrap::before{
  content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
  width:30px;height:8px;
  background:linear-gradient(90deg, transparent, rgba(255,120,50,.4), rgba(255,200,50,.15));
  border-radius:4px;
  filter:blur(3px);
  animation:exhaustFlicker .3s ease-in-out infinite alternate;
}
/* Speed lines */
.car-wrap::after{
  content:'';position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);
  width:40px;height:16px;
  background:
    linear-gradient(0deg,
      transparent 0%, transparent 15%,
      rgba(255,255,255,.08) 15%, rgba(255,255,255,.08) 20%,
      transparent 20%, transparent 38%,
      rgba(255,255,255,.12) 38%, rgba(255,255,255,.12) 42%,
      transparent 42%, transparent 58%,
      rgba(255,255,255,.12) 58%, rgba(255,255,255,.12) 62%,
      transparent 62%, transparent 80%,
      rgba(255,255,255,.08) 80%, rgba(255,255,255,.08) 85%,
      transparent 85%);
  opacity:.6;
}
@keyframes exhaustFlicker{
  0%{width:25px;opacity:.6;}
  100%{width:35px;opacity:.9;}
}
/* Car shadow */
.car-shadow{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:36px;height:8px;background:rgba(0,0,0,.35);
  border-radius:50%;filter:blur(4px);
}

.car-wrap.leader-car{
  transform:translate(-50%,-50%) scale(1.15);
  animation:leaderGlow 2s ease-in-out infinite;
}
.car-wrap.leader-car::before{
  width:45px;height:12px;
  background:linear-gradient(90deg, transparent, rgba(255,100,30,.5), rgba(255,200,50,.25));
}
@keyframes leaderGlow{
  0%,100%{filter:drop-shadow(0 0 8px currentColor) drop-shadow(0 4px 8px rgba(0,0,0,.5));}
  50%{filter:drop-shadow(0 0 20px currentColor) drop-shadow(0 0 35px currentColor) drop-shadow(0 4px 8px rgba(0,0,0,.5));}
}
.car-wrap.finished{
  filter:drop-shadow(0 0 14px #10b981) drop-shadow(0 0 28px #10b981) drop-shadow(0 4px 8px rgba(0,0,0,.5));
}

/* Finished text flash */
.plan-done-flash{
  position:absolute;top:50%;right:20px;transform:translateY(-50%);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#10b981;
  text-shadow:0 0 10px #10b981, 0 0 20px #10b981;
  animation:flashIn .6s ease-out forwards;
  z-index:5;
  white-space:nowrap;
}
@keyframes flashIn{
  0%{opacity:0;transform:translateY(-50%) scale(1.5);}
  60%{opacity:1;transform:translateY(-50%) scale(0.95);}
  100%{opacity:1;transform:translateY(-50%) scale(1);}
}

/* ── RIGHT: STATS PANEL ── */
.track-stats{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.track-stats-top{display:flex;align-items:center;gap:12px;justify-content:flex-end;}
.track-pct{
  font-family:'DM Sans',sans-serif;font-size:34px;font-weight:800;
  font-variant-numeric:tabular-nums;line-height:1;
  letter-spacing:-0.5px;
}
/* Mini progress arc */
.mini-arc{
  width:38px;height:38px;flex-shrink:0;
}
.mini-arc circle{transition:stroke-dashoffset 2s cubic-bezier(0.34,1.56,0.64,1);}
.track-amounts{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:0.3px;}
.track-deals-row{display:flex;gap:6px;justify-content:flex-end;margin-top:2px;}
.track-deal-badge{
  font-size:10px;padding:2px 8px;border-radius:8px;
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.35);font-weight:600;
  border:1px solid rgba(255,255,255,.04);
}

/* ══════════════════════════════════════════════════════
   CONFETTI / EXPLOSION
   ══════════════════════════════════════════════════════ */
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(80px) rotate(720deg) scale(0);opacity:0;}
}
.confetti-particle{
  position:absolute;border-radius:50%;
  animation:confetti-fall 1.8s ease-out forwards;
  pointer-events:none;z-index:10;
}
/* Green neon explosion ring */
@keyframes neonBurst{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(3);opacity:0;}
}
.neon-burst{
  position:absolute;width:40px;height:40px;border-radius:50%;
  border:2px solid #10b981;pointer-events:none;z-index:9;
  animation:neonBurst .8s ease-out forwards;
  box-shadow:0 0 20px #10b981;
}

/* ══════════════════════════════════════════════════════
   BOTTOM PANEL (glassmorphism cards)
   ══════════════════════════════════════════════════════ */
.bottom-panel{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  padding:0 40px 24px;flex-shrink:0;
}
.panel-card{
  background:rgba(13,17,23,.7);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(99,102,241,0.1);
  border-radius:18px;padding:20px 24px;
  position:relative;overflow:hidden;
}
.panel-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(99,102,241,.2), transparent);
}
.panel-title{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.panel-title-dot{
  width:6px;height:6px;border-radius:50%;
  background:#10b981;
  box-shadow:0 0 6px #10b981;
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── TOP-3 MANAGERS ── */
.top3-list{display:flex;flex-direction:column;gap:10px;}
.top3-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  transition:all .4s;
  position:relative;overflow:hidden;
}
.top3-item.gold{
  background:linear-gradient(135deg, rgba(255,215,0,.05), rgba(255,170,0,.02));
  border-color:rgba(255,215,0,.15);
  box-shadow:0 0 24px rgba(255,215,0,.04);
}
.top3-item.gold::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,215,0,.3), transparent);
}
.top3-item.silver{
  background:rgba(192,192,192,.03);
  border-color:rgba(192,192,192,.1);
}
.top3-item.bronze{
  background:rgba(205,127,50,.03);
  border-color:rgba(205,127,50,.08);
}
.top3-medal{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
.top3-info{flex:1;min-width:0;}
.top3-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px;}
.top3-amount{
  font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;
  font-variant-numeric:tabular-nums;white-space:nowrap;
  letter-spacing:-0.3px;
}
.top3-amount.gold-text{color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.3);}
.top3-amount.silver-text{color:#c0c0c0;}
.top3-amount.bronze-text{color:#cd7f32;}

/* ── FEED ── */
.feed-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow:hidden;}
.feed-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:12px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);
  font-size:13px;font-weight:500;
  animation:feedSlideIn .6s cubic-bezier(.4,0,.2,1);
  transition:all .3s;
}
.feed-item.highlight{
  background:rgba(16,185,129,.06);
  border-color:rgba(16,185,129,.15);
  box-shadow:0 0 20px rgba(16,185,129,.05);
}
@keyframes feedSlideIn{
  from{opacity:0;transform:translateX(-30px) scale(.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.feed-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.6);}
.feed-amount{
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.feed-tag{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;
  background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.15);
  color:rgba(255,255,255,.4);white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;
}
.feed-empty{
  text-align:center;padding:24px;color:rgba(255,255,255,.2);font-size:13px;
}

/* ══════════════════════════════════════════════════════
   LOADING
   ══════════════════════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg, #050816, #0a1628);flex-direction:column;gap:20px;
}
.loading-spinner{
  width:44px;height:44px;border:3px solid rgba(99,102,241,.15);
  border-top-color:rgba(99,102,241,.7);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:rgba(255,255,255,.3);letter-spacing:1px;}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════ */
@media(max-width:1400px){
  .header{padding:0 24px;height:54px;}
  .header-title{font-size:18px;}
  .header-clock{font-size:22px;}
  .race-section{padding:16px 24px 12px;gap:10px;}
  .race-track{grid-template-columns:170px 1fr 160px;padding:12px 18px;}
  .track-rop{font-size:18px;}
  .track-pct{font-size:28px;}
  .bottom-panel{padding:0 24px 16px;gap:16px;}
}
@media(max-width:1024px){
  .race-track{grid-template-columns:140px 1fr 130px;gap:12px;}
  .track-rop{font-size:16px;}
  .track-pct{font-size:22px;}
  .track-lane{height:44px;}
  .bottom-panel{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .header{flex-wrap:wrap;height:auto;padding:12px 16px;gap:8px;}
  .race-section{padding:12px 16px;gap:10px;}
  .race-track{grid-template-columns:100px 1fr 100px;padding:10px 14px;}
  .track-rop{font-size:14px;}
  .track-pct{font-size:18px;}
  .bottom-panel{padding:0 16px 12px;}
}
</style>
</head>
<body class="cursor-visible">

<!-- PARTICLES -->
<canvas id="particles-canvas"></canvas>

<!-- CYBERPUNK GRID -->
<div class="cyber-grid"><div class="cyber-grid-inner"></div></div>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Загрузка данных...</div>
</div>

<!-- MAIN PAGE -->
<div class="page" id="page" style="display:none;">
  <!-- HEADER -->
  <div class="header">
    <div class="header-title">ГОНКА К ПЛАНУ</div>
    <div class="header-month" id="headerMonth"></div>
    <div class="header-right">
      <div class="header-clock" id="headerClock"></div>
      <div class="header-badge" id="headerBadge">Обновлено: --:--</div>
    </div>
  </div>

  <!-- RACE TRACKS -->
  <div class="race-section" id="raceTracks"></div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-dot"></span> Топ-3 менеджера дня</div>
      <div class="top3-list" id="top3List"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-dot"></span> Лента сделок</div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  PARTICLES ENGINE
// ══════════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const COUNT = 60;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function createParticle(){
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.4 + 0.1,
      pulse: Math.random() * Math.PI * 2,
    };
  }
  for(let i=0;i<COUNT;i++) particles.push(createParticle());

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.02;
      const a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));
      if(p.x < 0) p.x = canvas.width;
      if(p.x > canvas.width) p.x = 0;
      if(p.y < 0) p.y = canvas.height;
      if(p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140,160,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ═══════════════════ UTILS ═══════════════════════════════════════
const parseDate = s => { const [d,m,y] = s.split('.'); return new Date(+y, +m-1, +d); };
const fmtDate = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
const fmt = n => Math.round(n).toLocaleString('ru-RU');
const fmtM = n => fmt(Math.round(n)) + ' \u20B8';
const getMonthKey = d => `${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;

function getDatesInRange(from, to) {
  const res = []; let cur = parseDate(from); const end = parseDate(to);
  while (cur <= end) { res.push(fmtDate(cur)); cur = new Date(cur.getTime() + 86400000); }
  return res;
}

function getRop(mgrName) {
  if (_ropCache[mgrName] !== undefined) return _ropCache[mgrName];
  if (MGR_TO_ROP[mgrName]) { _ropCache[mgrName] = MGR_TO_ROP[mgrName]; return _ropCache[mgrName]; }
  const lower = mgrName.toLowerCase();
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    if (k.toLowerCase() === lower) { _ropCache[mgrName] = v; return v; }
  }
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    const kl = k.toLowerCase();
    if (lower.startsWith(kl) || kl.startsWith(lower)) { _ropCache[mgrName] = v; return v; }
  }
  const pinMatch = lower.match(/^п[иі]н\s*(\d+)/i);
  if (pinMatch) {
    const pinNum = pinMatch[1];
    for (const [k,v] of Object.entries(MGR_TO_ROP)) {
      const km = k.toLowerCase().match(/^п[иі]н\s*(\d+)/i);
      if (km && km[1] === pinNum) { _ropCache[mgrName] = v; return v; }
    }
  }
  _ropCache[mgrName] = '';
  return '';
}
function clearRopCache() { Object.keys(_ropCache).forEach(k => delete _ropCache[k]); }

function aggregateManagersByPeriod(prodKey, from, to) {
  const allMgrs = MANAGERS[prodKey] || [];
  const dates = new Set(getDatesInRange(from, to));
  return allMgrs.map(m => {
    if (m.daily && Object.keys(m.daily).length > 0) {
      let leads=0, deals=0, budget=0;
      for (const [d, v] of Object.entries(m.daily)) {
        if (dates.has(d)) { leads += v[0]||0; deals += v[1]||0; budget += v[2]||0; }
      }
      return { name: m.name, leads, deals, budget: Math.round(budget) };
    }
    return { name: m.name, leads: m.leads||0, deals: m.deals||0, budget: m.budget||0 };
  }).filter(m => m.budget > 0 || m.leads > 0);
}

// ═══════════════════ MINI ARC SVG ═══════════════════════════════
function miniArcSVG(pct, color) {
  const r = 15;
  const circ = 2 * Math.PI * r;
  const offset = circ - (Math.min(pct, 100) / 100) * circ;
  return `<svg class="mini-arc" viewBox="0 0 38 38">
    <circle cx="19" cy="19" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/>
    <circle cx="19" cy="19" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      stroke-linecap="round"
      transform="rotate(-90 19 19)"
      style="transition:stroke-dashoffset 2s cubic-bezier(0.34,1.56,0.64,1)"/>
    <text x="19" y="21" text-anchor="middle" font-size="8" font-weight="700" fill="rgba(255,255,255,.5)" font-family="DM Sans">${Math.round(pct)}%</text>
  </svg>`;
}

// ═══════════════════ RACE CALCULATION ═══════════════════════════════
function calcRopData() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const monthFrom = `01.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthTo = `${String(lastDay).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthKey = `${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;

  const results = [];
  for (const [ropName, crms] of Object.entries(ROP_CRM_MAP)) {
    let fact=0, leads=0, deals=0, mgrCount=0;
    const mgrSet = new Set();
    crms.forEach(crm => {
      const mgrs = aggregateManagersByPeriod(crm, monthFrom, monthTo);
      mgrs.filter(m => getRop(m.name) === ropName).forEach(m => {
        fact += m.budget||0; leads += m.leads||0; deals += m.deals||0;
        mgrSet.add(m.name);
      });
    });
    mgrCount = mgrSet.size;
    const plan = (ROP_PLANS[ropName] && ROP_PLANS[ropName][monthKey]) || 0;
    const pct = plan > 0 ? (fact / plan * 100) : 0;
    results.push({ name: ropName, fact, plan, pct, leads, deals, mgrCount, color: ROP_COLORS[ropName] });
  }
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

// ═══════════════════ TOP-3 & FEED ═══════════════════════════════════
function getTodayManagers() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allMgrs = [];
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];

  allCrms.forEach(crm => {
    const mgrs = aggregateManagersByPeriod(crm, todayStr, todayStr);
    mgrs.forEach(m => {
      allMgrs.push({ ...m, crm });
    });
  });
  return allMgrs;
}

function calcTop3() {
  const mgrs = getTodayManagers();
  const map = {};
  mgrs.forEach(m => {
    if (!map[m.name] || map[m.name].budget < m.budget) {
      map[m.name] = m;
    } else {
      map[m.name].budget += m.budget;
      map[m.name].deals += m.deals;
    }
  });
  return Object.values(map).sort((a,b) => b.budget - a.budget).slice(0, 3);
}

function calcFeed() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  const entries = [];

  allCrms.forEach(crm => {
    const mgrList = MANAGERS[crm] || [];
    mgrList.forEach(m => {
      if (m.daily && m.daily[todayStr]) {
        const v = m.daily[todayStr];
        const budget = v[2] || 0;
        if (budget > 0) {
          entries.push({ name: m.name, budget, deals: v[1]||0, crm });
        }
      }
    });
  });

  entries.sort((a,b) => b.budget - a.budget);
  return entries.slice(0, 7);
}

// ═══════════════════ RENDER ═══════════════════════════════════════
function renderRace() {
  const data = calcRopData();
  const container = document.getElementById('raceTracks');

  let tracks = container.querySelectorAll('.race-track');

  if (tracks.length !== data.length) {
    container.innerHTML = data.map((r, i) => `
      <div class="race-track ${i === 0 ? 'leader' : ''}" data-rop="${r.name}">
        <div class="track-info">
          <div class="track-name-row">
            <div class="track-position pos-${i+1}">${i+1}</div>
            <div class="track-rop" style="color:${r.color}">${r.name.replace('РОП ','')}</div>
          </div>
          <div class="track-meta">
            <span class="track-badge">${r.mgrCount} менеджеров</span>
          </div>
        </div>
        <div class="track-lane" style="--lane-color-glow:${r.color}40">
          <div class="track-progress" style="width:0%;position:absolute;">
            <div class="track-progress-inner" style="background:${r.color}"></div>
            <div class="track-progress-glow" style="background:${r.color}"></div>
          </div>
          <div class="finish-line"></div>
          <div class="car-wrap ${i === 0 ? 'leader-car' : ''}" style="left:0%;color:${r.color}">
            <div class="car-shadow"></div>
            ${carSVG(r.color)}
          </div>
          ${r.pct >= 100 ? '<div class="plan-done-flash">ПЛАН ВЫПОЛНЕН!</div>' : ''}
        </div>
        <div class="track-stats">
          <div class="track-stats-top">
            ${miniArcSVG(r.pct, r.color)}
            <div class="track-pct" style="color:${r.color}">0%</div>
          </div>
          <div class="track-amounts">${fmtM(r.fact)} / ${fmtM(r.plan)}</div>
          <div class="track-deals-row">
            <span class="track-deal-badge">${r.leads} лидов</span>
            <span class="track-deal-badge">${r.deals} сделок</span>
          </div>
        </div>
      </div>
    `).join('');
    tracks = container.querySelectorAll('.race-track');
  }

  // Animate after brief delay
  requestAnimationFrame(() => {
    setTimeout(() => {
      data.forEach((r, i) => {
        const track = tracks[i];
        if (!track) return;

        // Update classes
        track.className = 'race-track' + (i === 0 ? ' leader' : '');
        track.dataset.rop = r.name;

        // Left info
        const ropEl = track.querySelector('.track-rop');
        ropEl.style.color = r.color;
        ropEl.textContent = r.name.replace('РОП ','');

        const posEl = track.querySelector('.track-position');
        posEl.className = 'track-position pos-' + (i+1);
        posEl.textContent = i+1;

        track.querySelector('.track-badge').textContent = r.mgrCount + ' менеджеров';

        // Lane glow color
        track.querySelector('.track-lane').style.setProperty('--lane-color-glow', r.color + '40');

        // Animate progress bar
        const pctClamped = Math.min(r.pct, 100);
        const progress = track.querySelector('.track-progress');
        progress.style.width = pctClamped + '%';
        progress.querySelector('.track-progress-inner').style.background = r.color;
        progress.querySelector('.track-progress-glow').style.background = r.color;

        // Animate car
        const car = track.querySelector('.car-wrap');
        car.style.left = pctClamped + '%';
        car.style.color = r.color;
        car.className = 'car-wrap' + (i === 0 ? ' leader-car' : '') + (r.pct >= 100 ? ' finished' : '');

        // Plan done flash
        const lane = track.querySelector('.track-lane');
        const existingFlash = lane.querySelector('.plan-done-flash');
        if (r.pct >= 100 && !existingFlash) {
          const flash = document.createElement('div');
          flash.className = 'plan-done-flash';
          flash.textContent = 'ПЛАН ВЫПОЛНЕН!';
          lane.appendChild(flash);
        } else if (r.pct < 100 && existingFlash) {
          existingFlash.remove();
        }

        // Right stats
        track.querySelector('.track-pct').textContent = r.pct.toFixed(1) + '%';
        track.querySelector('.track-pct').style.color = r.color;
        track.querySelector('.track-amounts').textContent = fmtM(r.fact) + ' / ' + fmtM(r.plan);

        // Update mini arc
        const statsTop = track.querySelector('.track-stats-top');
        const oldArc = statsTop.querySelector('.mini-arc');
        if (oldArc) {
          const tmpDiv = document.createElement('div');
          tmpDiv.innerHTML = miniArcSVG(r.pct, r.color);
          oldArc.replaceWith(tmpDiv.firstElementChild);
        }

        // Update deal badges
        const dealRow = track.querySelector('.track-deals-row');
        if (dealRow) {
          dealRow.innerHTML = `
            <span class="track-deal-badge">${r.leads} лидов</span>
            <span class="track-deal-badge">${r.deals} сделок</span>
          `;
        }

        // Confetti on crossing 100%
        if (r.pct >= 100 && !prevFinished.has(r.name)) {
          prevFinished.add(r.name);
          spawnConfetti(track);
        }
      });
    }, 50);
  });
}

  const top3 = calcTop3();

  const classes = ['gold', 'silver', 'bronze'];

function renderFeed() {
  const feed = calcFeed();
  const el = document.getElementById('feedList');

  if (feed.length === 0) {
    el.innerHTML = '<div class="feed-empty">Нет сделок за сегодня</div>';
    return;

  const newKeys = new Set(feed.map(f => f.name + ':' + f.budget));

        <div class="feed-tag">${f.crm}</div>

function renderAll() {

}

    MONTH_NAMES[now.getMonth()].toUpperCase() + ' ' + now.getFullYear();

// ═══════════════════ DATA LOADING ═══════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data,updated_at`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      const d = rows[0].data;
      if (d.RAW)        RAW = d.RAW;
      if (d.MANAGERS)   MANAGERS = d.MANAGERS;
      if (d.MGR_TO_ROP && Object.keys(d.MGR_TO_ROP).length > 0) {
        MGR_TO_ROP = d.MGR_TO_ROP;
        clearRopCache();
      }
      if (d.ROP_PLANS)  ROP_PLANS = d.ROP_PLANS;

      if (rows[0].updated_at) {
        const dt = new Date(rows[0].updated_at);
        document.getElementById('headerBadge').textContent =
          'Обновлено: ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      }
    }
    return true;
  } catch(e) {
    console.warn('Supabase load error:', e);
    return false;
  }
}

// ═══════════════════ CURSOR AUTO-HIDE ═══════════════════════════════
let cursorTimer;
function resetCursor() {
  document.body.classList.add('cursor-visible');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => {
    document.body.classList.remove('cursor-visible');
  }, 3000);
}
document.addEventListener('mousemove', resetCursor);
document.addEventListener('mousedown', resetCursor);

// ═══════════════════ INIT ═══════════════════════════════════════
async function init() {
  updateHeader();
  setInterval(updateHeader, 1000);

  const ok = await loadData();
  if (ok) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page').style.display = 'flex';
    renderAll();
  } else {
    document.querySelector('.loading-text').textContent = 'Ошибка загрузки данных. Повтор...';
    setTimeout(init, 5000);
    return;
  }

  // Auto-reload every 60s
  setInterval(async () => {
    await loadData();
    renderAll();
  }, 60000);
}

init();
