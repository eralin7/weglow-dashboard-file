<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeGlow — Гонка к Плану</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}
body{
  font-family:'DM Sans',sans-serif;
  background:#000;
  color:#1a1a2e;
  min-height:100vh;
  overflow:hidden;
}

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
.page{display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════════════════════
   3D SCENE CONTAINER (top 70%)
   ══════════════════════════════════════════════════════ */
.scene-container{
  position:relative;
  flex:7;
  min-height:0;
  overflow:hidden;
}
.scene-container canvas{
  display:block;
  width:100%!important;
  height:100%!important;
}

/* ══════════════════════════════════════════════════════
   HUD OVERLAY
   ══════════════════════════════════════════════════════ */
.hud{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:10;
}
.hud *{pointer-events:auto;}

/* Title bar (top-left) */
.hud-title-bar{
  position:absolute;top:16px;left:16px;
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;
  padding:12px 20px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(0,0,0,.05);
}
.hud-main-title{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#1a1a2e;
}
.hud-clock{
  font-family:'DM Sans',sans-serif;font-size:24px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:2px;
  color:#1a1a2e;
}
.hud-badge{
  font-size:11px;padding:5px 14px;border-radius:20px;
  background:rgba(16,185,129,.08);
  border:1px solid rgba(16,185,129,.15);
  color:#059669;font-weight:600;
}

/* Scoreboard (top-right) */
.scoreboard{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;
  padding:14px 18px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(0,0,0,.05);
  min-width:260px;
}
.scoreboard-title{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.scoreboard-live{
  width:6px;height:6px;border-radius:50%;background:#ef4444;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.sb-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 0;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.sb-row:last-child{border-bottom:none;}
.sb-pos{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
}
.sb-pos.p1{background:#ffd700;color:#1a1200;}
.sb-pos.p2{background:#c0c0c0;color:#333;}
.sb-pos.p3{background:#cd7f32;color:#fff;}
.sb-pos.p4{background:#e5e7eb;color:#6b7280;}
.sb-name{flex:1;font-size:13px;font-weight:600;color:#1a1a2e;}
.sb-pct{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;}
.sb-detail{font-size:9px;color:#9ca3af;font-weight:500;}

/* Car labels floating in 3D (rendered as HTML) */
.car-label{
  position:absolute;
  transform:translate(-50%,-100%);
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);
  border-radius:8px;
  padding:6px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  border:2px solid currentColor;
  white-space:nowrap;
  pointer-events:none;
  transition:opacity .3s;
  z-index:11;
}
.car-label-name{
  font-family:'Playfair Display',serif;font-size:14px;font-weight:700;
}
.car-label-pct{
  font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;
  text-align:center;
}
.car-label-detail{
  font-size:10px;color:#6b7280;text-align:center;
}

/* Zoom hint */
.zoom-hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  color:#fff;
  padding:8px 20px;
  border-radius:20px;
  font-size:12px;font-weight:500;
  letter-spacing:0.5px;
  transition:opacity 1s;
}
.zoom-hint.hidden{opacity:0;pointer-events:none;}

/* ══════════════════════════════════════════════════════
   BOTTOM PANEL (30%)
   ══════════════════════════════════════════════════════ */
.bottom-panel{
  flex:3;
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  padding:12px 40px 20px;
  background:linear-gradient(180deg, #f8fafc, #ffffff);
  border-top:1px solid rgba(0,0,0,.06);
  min-height:0;
  overflow:hidden;
}
.panel-card{
  background:#fff;
  border-radius:16px;padding:16px 20px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.04);
  display:flex;flex-direction:column;
  min-height:0;
}
.panel-title{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:#6b7280;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.panel-title-dot{
  width:7px;height:7px;border-radius:50%;
  background:#10b981;
  box-shadow:0 0 6px #10b981;
  animation:livePulse 2s ease-in-out infinite;
}
.panel-title-dot.red{background:#ef4444;box-shadow:0 0 6px #ef4444;}

/* ── TOP-3 MANAGERS ── */
.top3-list{display:flex;flex-direction:column;gap:8px;overflow:hidden;flex:1;}
.top3-item{
  display:flex;align-items:center;gap:14px;
  padding:10px 14px;border-radius:12px;
  background:#fafafa;
  transition:all .4s;
  position:relative;overflow:hidden;
}
.top3-item.gold{
  background:linear-gradient(135deg, #fffbeb, #fef3c7);
  border-left:4px solid #fbbf24;
}
.top3-item.silver{
  background:linear-gradient(135deg, #f9fafb, #f3f4f6);
  border-left:4px solid #c0c0c0;
}
.top3-item.bronze{
  background:linear-gradient(135deg, #fdf8f0, #fde7cb);
  border-left:4px solid #cd7f32;
}
.top3-medal{font-size:26px;flex-shrink:0;width:32px;text-align:center;}
.top3-info{flex:1;min-width:0;}
.top3-name{font-size:14px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.top3-amount{
  font-family:'DM Sans',sans-serif;font-size:18px;font-weight:800;
  font-variant-numeric:tabular-nums;white-space:nowrap;
  letter-spacing:-0.3px;
}
.top3-amount.gold-text{color:#d97706;}
.top3-amount.silver-text{color:#6b7280;}
.top3-amount.bronze-text{color:#a0622e;}

/* ── FEED ── */
.feed-list{display:flex;flex-direction:column;gap:6px;overflow:hidden;flex:1;}
.feed-item{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px;border-radius:10px;
  background:#fafafa;
  font-size:13px;font-weight:500;
  animation:feedSlideIn .6s cubic-bezier(.4,0,.2,1);
  transition:all .3s;
}
.feed-item.highlight{
  background:linear-gradient(135deg, #ecfdf5, #d1fae5);
  border:1px solid rgba(16,185,129,.15);
}
@keyframes feedSlideIn{
  from{opacity:0;transform:translateX(-30px) scale(.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.feed-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#6b7280;}
.feed-amount{
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  font-variant-numeric:tabular-nums;white-space:nowrap;color:#1a1a2e;
}
.feed-tag{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;
  background:rgba(99,102,241,.08);
  border:1px solid rgba(99,102,241,.1);
  color:#6366f1;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;
}
.feed-empty{
  text-align:center;padding:24px;color:#9ca3af;font-size:13px;
}

/* ══════════════════════════════════════════════════════
   LOADING
   ══════════════════════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, #87CEEB 0%, #c5e8f7 40%, #ffffff 100%);
  flex-direction:column;gap:20px;
  transition:opacity .8s;
}
.loading-screen.fade-out{opacity:0;pointer-events:none;}
.loading-bar-container{
  width:300px;height:6px;border-radius:3px;
  background:rgba(0,0,0,.1);overflow:hidden;
}
.loading-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg, #6366f1, #10b981);
  border-radius:3px;
  transition:width .3s;
}
.loading-text{font-size:13px;color:#6b7280;letter-spacing:1px;}
.loading-title{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:800;
  letter-spacing:3px;color:#1a1a2e;
}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════ */
@media(max-width:1400px){
  .bottom-panel{padding:10px 24px 14px;gap:16px;}
  .hud-main-title{font-size:17px;}
  .hud-clock{font-size:20px;}
}
@media(max-width:1024px){
  .bottom-panel{grid-template-columns:1fr;}
  .scoreboard{display:none;}
}
@media(max-width:768px){
  .bottom-panel{padding:8px 16px 12px;}
  .hud-title-bar{padding:8px 14px;}
  .hud-main-title{font-size:14px;}
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading">
  <div class="loading-title">ГОНКА К ПЛАНУ</div>
  <div class="loading-bar-container">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <div class="loading-text" id="loadingText">Загрузка 3D моделей...</div>
</div>

<!-- MAIN PAGE -->
<div class="page" id="page" style="display:none;">

  <!-- 3D SCENE -->
  <div class="scene-container" id="sceneContainer">
    <div class="hud">
      <!-- Title bar top-left -->
      <div class="hud-title-bar">
        <div class="hud-main-title">ГОНКА К ПЛАНУ</div>
        <div style="width:1px;height:24px;background:rgba(0,0,0,.1);"></div>
        <div class="hud-clock" id="headerClock"></div>
        <div class="hud-badge" id="headerBadge">Обновлено: --:--</div>
      </div>

      <!-- Scoreboard top-right -->
      <div class="scoreboard" id="scoreboard"></div>

      <!-- Car labels (positioned by JS) -->
      <div id="carLabelsContainer"></div>

      <!-- Zoom hint -->
      <div class="zoom-hint" id="zoomHint">Колёсико мыши — масштаб | Перетаскивание — поворот</div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-dot"></span> Топ-3 менеджера дня</div>
      <div class="top3-list" id="top3List"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-dot red"></span> Live-лента сделок</div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>
</div>

<!-- 3D SCENE + DATA LOGIC -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════ CONFIG ═══════════════════════════════════════
const SUPABASE_URL = 'https://bdyakgmeibpdkisbiykt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkeWFrZ21laWJwZGtpc2JpeWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTQzOTMsImV4cCI6MjA4Nzc5MDM5M30.nA187grJR6XFQRmTP6WOM-6-1dZK1EzYNNP2JH9aAMg';

const ROP_CRM_MAP = {
  'РОП Айдана': ['Коллаген', 'Ummi'],
  'РОП Аслиддин': ['Коллаген'],
  'РОП Нурдаулет': ['Коллаген'],
  'РОП Диас': ['Ummi'],
};
const ROP_COLORS = {
  'РОП Айдана': '#1a56db',
  'РОП Аслиддин': '#f59e0b',
  'РОП Нурдаулет': '#10b981',
  'РОП Диас': '#ef4444',
};
const MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// ═══════════════════ 3D CAR CONFIG ═══════════════════════════════
const ROP_CARS = {
  'РОП Айдана':    { color: 0x1a56db, laneOffset: -3, mesh: null, targetPos: null, targetRot: 0, wheelMeshes: [] },
  'РОП Аслиддин':  { color: 0xf59e0b, laneOffset: -1, mesh: null, targetPos: null, targetRot: 0, wheelMeshes: [] },
  'РОП Нурдаулет': { color: 0x10b981, laneOffset: 1,  mesh: null, targetPos: null, targetRot: 0, wheelMeshes: [] },
  'РОП Диас':      { color: 0xef4444, laneOffset: 3,  mesh: null, targetPos: null, targetRot: 0, wheelMeshes: [] },
};

// ═══════════════════ DATA STATE ═══════════════════════════════════
let RAW = {}, MANAGERS = {}, ROP_PLANS = {}, MGR_TO_ROP = {};
const _ropCache = {};
let prevFeedKeys = new Set();
let prevFinished = new Set();

// ═══════════════════ UTILS ═══════════════════════════════════════
const parseDate = s => { const [d,m,y] = s.split('.'); return new Date(+y, +m-1, +d); };
const fmtDate = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
const fmt = n => Math.round(n).toLocaleString('ru-RU');
const fmtM = n => fmt(Math.round(n)) + ' \u20B8';
const getMonthKey = d => `${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;

function getDatesInRange(from, to) {
  const res = []; let cur = parseDate(from); const end = parseDate(to);
  while (cur <= end) { res.push(fmtDate(cur)); cur = new Date(cur.getTime() + 86400000); }
  return res;
}

function getRop(mgrName) {
  if (_ropCache[mgrName] !== undefined) return _ropCache[mgrName];
  if (MGR_TO_ROP[mgrName]) { _ropCache[mgrName] = MGR_TO_ROP[mgrName]; return _ropCache[mgrName]; }
  const lower = mgrName.toLowerCase();
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    if (k.toLowerCase() === lower) { _ropCache[mgrName] = v; return v; }
  }
  for (const [k,v] of Object.entries(MGR_TO_ROP)) {
    const kl = k.toLowerCase();
    if (lower.startsWith(kl) || kl.startsWith(lower)) { _ropCache[mgrName] = v; return v; }
  }
  const pinMatch = lower.match(/^п[иі]н\s*(\d+)/i);
  if (pinMatch) {
    const pinNum = pinMatch[1];
    for (const [k,v] of Object.entries(MGR_TO_ROP)) {
      const km = k.toLowerCase().match(/^п[иі]н\s*(\d+)/i);
      if (km && km[1] === pinNum) { _ropCache[mgrName] = v; return v; }
    }
  }
  _ropCache[mgrName] = '';
  return '';
}
function clearRopCache() { Object.keys(_ropCache).forEach(k => delete _ropCache[k]); }

function aggregateManagersByPeriod(prodKey, from, to) {
  const allMgrs = MANAGERS[prodKey] || [];
  const dates = new Set(getDatesInRange(from, to));
  return allMgrs.map(m => {
    if (m.daily && Object.keys(m.daily).length > 0) {
      let leads=0, deals=0, budget=0;
      for (const [d, v] of Object.entries(m.daily)) {
        if (dates.has(d)) { leads += v[0]||0; deals += v[1]||0; budget += v[2]||0; }
      }
      return { name: m.name, leads, deals, budget: Math.round(budget) };
    }
    return { name: m.name, leads: m.leads||0, deals: m.deals||0, budget: m.budget||0 };
  }).filter(m => m.budget > 0 || m.leads > 0);
}

// ═══════════════════ RACE CALCULATION ═══════════════════════════════
function calcRopData() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const monthFrom = `01.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthTo = `${String(lastDay).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const monthKey = `${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;

  const results = [];
  for (const [ropName, crms] of Object.entries(ROP_CRM_MAP)) {
    let fact=0, leads=0, deals=0, mgrCount=0;
    const mgrSet = new Set();
    crms.forEach(crm => {
      const mgrs = aggregateManagersByPeriod(crm, monthFrom, monthTo);
      mgrs.filter(m => getRop(m.name) === ropName).forEach(m => {
        fact += m.budget||0; leads += m.leads||0; deals += m.deals||0;
        mgrSet.add(m.name);
      });
    });
    mgrCount = mgrSet.size;
    const plan = (ROP_PLANS[ropName] && ROP_PLANS[ropName][monthKey]) || 0;
    const pct = plan > 0 ? (fact / plan * 100) : 0;
    results.push({ name: ropName, fact, plan, pct, leads, deals, mgrCount, color: ROP_COLORS[ropName] });
  }
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

// ═══════════════════ TOP-3 & FEED ═══════════════════════════════════
function getTodayManagers() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allMgrs = [];
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  allCrms.forEach(crm => {
    const mgrs = aggregateManagersByPeriod(crm, todayStr, todayStr);
    mgrs.forEach(m => { allMgrs.push({ ...m, crm }); });
  });
  return allMgrs;
}

function calcTop3() {
  const mgrs = getTodayManagers();
  const map = {};
  mgrs.forEach(m => {
    if (!map[m.name] || map[m.name].budget < m.budget) {
      map[m.name] = m;
    } else {
      map[m.name].budget += m.budget;
      map[m.name].deals += m.deals;
    }
  });
  return Object.values(map).sort((a,b) => b.budget - a.budget).slice(0, 3);
}

function calcFeed() {
  const now = new Date();
  const todayStr = fmtDate(now);
  const allCrms = [...new Set(Object.values(ROP_CRM_MAP).flat())];
  const entries = [];
  allCrms.forEach(crm => {
    const mgrList = MANAGERS[crm] || [];
    mgrList.forEach(m => {
      if (m.daily && m.daily[todayStr]) {
        const v = m.daily[todayStr];
        const budget = v[2] || 0;
        if (budget > 0) {
          entries.push({ name: m.name, budget, deals: v[1]||0, crm });
        }
      }
    });
  });
  entries.sort((a,b) => b.budget - a.budget);
  return entries.slice(0, 7);
}

// ═══════════════════ DATA LOADING ═══════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/weglow_data?id=eq.1&select=data,updated_at`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      const d = rows[0].data;
      if (d.RAW)        RAW = d.RAW;
      if (d.MANAGERS)   MANAGERS = d.MANAGERS;
      if (d.MGR_TO_ROP && Object.keys(d.MGR_TO_ROP).length > 0) {
        MGR_TO_ROP = d.MGR_TO_ROP;
        clearRopCache();
      }
      if (d.ROP_PLANS)  ROP_PLANS = d.ROP_PLANS;

      if (rows[0].updated_at) {
        const dt = new Date(rows[0].updated_at);
        document.getElementById('headerBadge').textContent =
          'Обновлено: ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      }
    }
    return true;
  } catch(e) {
    console.warn('Supabase load error:', e);
    return false;
  }
}

// ═══════════════════ HEADER ═══════════════════════════════════════
function updateHeader() {
  const now = new Date();
  document.getElementById('headerClock').textContent =
    now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ═══════════════════ RENDER HTML PANELS ═══════════════════════════
function renderScoreboard(data) {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = `
    <div class="scoreboard-title"><span class="scoreboard-live"></span> ТАБЛИЦА ЛИДЕРОВ</div>
    ${data.map((r, i) => `
      <div class="sb-row">
        <div class="sb-pos p${i+1}">${i+1}</div>
        <div class="sb-name" style="color:${r.color}">${r.name.replace('РОП ','')}</div>
        <div>
          <div class="sb-pct" style="color:${r.color}">${r.pct.toFixed(1)}%</div>
          <div class="sb-detail">${fmtM(r.fact)} / ${fmtM(r.plan)}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderTop3() {
  const top3 = calcTop3();
  const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
  const classes = ['gold', 'silver', 'bronze'];
  const textClasses = ['gold-text', 'silver-text', 'bronze-text'];
  const el = document.getElementById('top3List');

  if (top3.length === 0) {
    el.innerHTML = '<div class="feed-empty">Нет данных за сегодня</div>';
    return;
  }

  el.innerHTML = top3.map((m, i) => `
    <div class="top3-item ${classes[i] || ''}">
      <div class="top3-medal">${medals[i] || ''}</div>
      <div class="top3-info">
        <div class="top3-name">${m.name}</div>
        <div class="top3-sub">${m.deals} сделок</div>
      </div>
      <div class="top3-amount ${textClasses[i] || ''}">${fmtM(m.budget)}</div>
    </div>
  `).join('');
}

function renderFeed() {
  const feed = calcFeed();
  const el = document.getElementById('feedList');

  if (feed.length === 0) {
    el.innerHTML = '<div class="feed-empty">Нет сделок за сегодня</div>';
    return;
  }

  const newKeys = new Set(feed.map(f => f.name + ':' + f.budget));

  el.innerHTML = feed.map(f => {
    const isNew = !prevFeedKeys.has(f.name + ':' + f.budget);
    const isHighlight = f.budget >= 100000;
    return `
      <div class="feed-item ${isHighlight ? 'highlight' : ''}" ${isNew ? '' : 'style="animation:none"'}>
        <div class="feed-name">${f.name}</div>
        <div class="feed-amount" ${isHighlight ? 'style="color:#059669"' : ''}>${fmtM(f.budget)}</div>
        <div class="feed-tag">${f.crm}</div>
      </div>
    `;
  }).join('');

  prevFeedKeys = newKeys;
}

// ═══════════════════ THREE.JS SCENE SETUP ═══════════════════════════
const sceneContainer = document.getElementById('sceneContainer');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 100, 300);

const camera = new THREE.PerspectiveCamera(45, sceneContainer.clientWidth / sceneContainer.clientHeight, 0.1, 1000);
camera.position.set(0, 25, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(sceneContainer.clientWidth, sceneContainer.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
sceneContainer.insertBefore(renderer.domElement, sceneContainer.firstChild);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 100;
controls.maxPolarAngle = Math.PI / 2.2;
controls.target.set(0, 0, 0);

// Lighting
const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(50, 50, 25);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x44aa44, 0.4);
scene.add(hemisphereLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x44aa44 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// ═══════════════════ TRACK PATH ═══════════════════════════════════
const TRACK_RX = 20;
const TRACK_RZ = 15;

function getTrackPosition(t, laneOffset) {
  const angle = t * Math.PI * 2;
  return new THREE.Vector3(
    Math.sin(angle) * TRACK_RX,
    0.5,
    Math.cos(angle) * TRACK_RZ + laneOffset
  );
}

function getTrackRotation(t) {
  const angle = t * Math.PI * 2;
  return Math.atan2(Math.cos(angle) * TRACK_RX, -Math.sin(angle) * TRACK_RZ);
}

// ═══════════════════ LOAD 3D MODELS ═══════════════════════════════
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let loadedCount = 0;
const totalLoads = 4; // track + chassis + wheels + data
const loadingBar = document.getElementById('loadingBar');
const loadingText = document.getElementById('loadingText');

function updateLoadProgress(label) {
  loadedCount++;
  const pct = Math.round((loadedCount / totalLoads) * 100);
  loadingBar.style.width = pct + '%';
  loadingText.textContent = label;
}

let modelsReady = false;
let dataReady = false;
let wheelTemplate = null;

// Load track
const trackPromise = new Promise((resolve) => {
  gltfLoader.load('assets/track-draco.glb', (gltf) => {
    const track = gltf.scene;
    track.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(track);
    updateLoadProgress('Трасса загружена...');
    resolve();
  }, undefined, (err) => {
    console.warn('Track load error:', err);
    updateLoadProgress('Трасса: ошибка загрузки');
    resolve();
  });
});

// Load chassis
const chassisPromise = new Promise((resolve) => {
  gltfLoader.load('assets/chassis-draco.glb', (gltf) => {
    const carTemplate = gltf.scene;

    for (const [ropName, config] of Object.entries(ROP_CARS)) {
      const car = carTemplate.clone();
      car.traverse(child => {
        if (child.isMesh) {
          child.material = child.material.clone();
          child.material.color.set(config.color);
          child.material.metalness = 0.4;
          child.material.roughness = 0.3;
          child.castShadow = true;
        }
      });
      // Start at 0% position
      const startPos = getTrackPosition(0, config.laneOffset);
      car.position.copy(startPos);
      car.rotation.y = getTrackRotation(0);
      car.userData.ropName = ropName;
      scene.add(car);
      config.mesh = car;
    }

    updateLoadProgress('Машины загружены...');
    resolve();
  }, undefined, (err) => {
    console.warn('Chassis load error:', err);
    updateLoadProgress('Машины: ошибка загрузки');
    resolve();
  });
});

// Load wheels
const wheelPromise = new Promise((resolve) => {
  gltfLoader.load('assets/wheel-draco.glb', (gltf) => {
    wheelTemplate = gltf.scene;

    // Attach wheels after chassis is loaded
    chassisPromise.then(() => {
      const wheelPositions = [
        { x: 0.7, y: -0.2, z: 0.6 },
        { x: -0.7, y: -0.2, z: 0.6 },
        { x: 0.7, y: -0.2, z: -0.6 },
        { x: -0.7, y: -0.2, z: -0.6 },
      ];
      for (const config of Object.values(ROP_CARS)) {
        if (!config.mesh) continue;
        config.wheelMeshes = [];
        wheelPositions.forEach(pos => {
          const wheel = wheelTemplate.clone();
          wheel.position.set(pos.x, pos.y, pos.z);
          // Mirror left wheels
          if (pos.x < 0) wheel.scale.x = -1;
          config.mesh.add(wheel);
          config.wheelMeshes.push(wheel);
        });
      }
      updateLoadProgress('Колёса установлены...');
      resolve();
    });
  }, undefined, (err) => {
    console.warn('Wheel load error:', err);
    updateLoadProgress('Колёса: ошибка загрузки');
    resolve();
  });
});

// ═══════════════════ CAR POSITION UPDATE ═══════════════════════════
function updateCarPositions(ropData) {
  for (const r of ropData) {
    const config = ROP_CARS[r.name];
    if (!config || !config.mesh) continue;
    const t = Math.min(r.pct / 100, 1.5);
    const pos = getTrackPosition(t, config.laneOffset);
    config.targetPos = pos;
    config.targetRot = getTrackRotation(t);
    config.pct = r.pct;
  }
}

// ═══════════════════ CAR LABELS (HTML over 3D) ═══════════════════
const carLabelsContainer = document.getElementById('carLabelsContainer');
let carLabelEls = {};

function createCarLabels() {
  carLabelsContainer.innerHTML = '';
  carLabelEls = {};
  for (const [ropName, config] of Object.entries(ROP_CARS)) {
    const label = document.createElement('div');
    label.className = 'car-label';
    label.style.color = ROP_COLORS[ropName];
    label.innerHTML = `
      <div class="car-label-name" style="color:${ROP_COLORS[ropName]}">${ropName.replace('РОП ','')}</div>
      <div class="car-label-pct" style="color:${ROP_COLORS[ropName]}">0%</div>
      <div class="car-label-detail">-- / --</div>
    `;
    carLabelsContainer.appendChild(label);
    carLabelEls[ropName] = label;
  }
}

function updateCarLabels(ropData) {
  for (const r of ropData) {
    const el = carLabelEls[r.name];
    if (!el) continue;
    el.querySelector('.car-label-pct').textContent = r.pct.toFixed(1) + '%';
    el.querySelector('.car-label-detail').textContent = fmtM(r.fact) + ' / ' + fmtM(r.plan);
  }
}

function projectCarLabels() {
  const rect = renderer.domElement.getBoundingClientRect();
  for (const [ropName, config] of Object.entries(ROP_CARS)) {
    if (!config.mesh || !carLabelEls[ropName]) continue;
    const pos = config.mesh.position.clone();
    pos.y += 2.5; // above car
    pos.project(camera);

    const x = (pos.x * 0.5 + 0.5) * rect.width;
    const y = (-pos.y * 0.5 + 0.5) * rect.height;

    const label = carLabelEls[ropName];
    // Hide if behind camera
    if (pos.z > 1) {
      label.style.opacity = '0';
    } else {
      label.style.opacity = '1';
      label.style.left = x + 'px';
      label.style.top = y + 'px';
    }
  }
}

// ═══════════════════ WHEEL ROTATION ═══════════════════════════════
let wheelRotation = 0;

// ═══════════════════ ANIMATION LOOP ═══════════════════════════════
function animate() {
  requestAnimationFrame(animate);

  // Smooth car movement
  for (const config of Object.values(ROP_CARS)) {
    if (config.mesh && config.targetPos) {
      config.mesh.position.lerp(config.targetPos, 0.02);
      config.mesh.rotation.y = THREE.MathUtils.lerp(
        config.mesh.rotation.y,
        config.targetRot,
        0.02
      );

      // Spin wheels based on movement
      if (config.wheelMeshes && config.wheelMeshes.length > 0) {
        config.wheelMeshes.forEach(w => {
          w.rotation.x += 0.05;
        });
      }
    }
  }

  controls.update();
  renderer.render(scene, camera);
  projectCarLabels();
}

// ═══════════════════ RESIZE ═══════════════════════════════════════
function onResize() {
  const w = sceneContainer.clientWidth;
  const h = sceneContainer.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ═══════════════════ RENDER ALL ═══════════════════════════════════
function renderAll() {
  const data = calcRopData();
  updateCarPositions(data);
  updateCarLabels(data);
  renderScoreboard(data);
  renderTop3();
  renderFeed();
}

// ═══════════════════ ZOOM HINT FADE ═══════════════════════════════
setTimeout(() => {
  document.getElementById('zoomHint').classList.add('hidden');
}, 5000);

// ═══════════════════ INIT ═══════════════════════════════════════
async function init() {
  updateHeader();
  setInterval(updateHeader, 1000);

  // Load data in parallel with models
  const dataPromise = loadData().then(ok => {
    updateLoadProgress('Данные загружены...');
    dataReady = ok;
    return ok;
  });

  // Wait for all
  await Promise.all([trackPromise, chassisPromise, wheelPromise, dataPromise]);

  // Create labels
  createCarLabels();

  // Start animation loop
  animate();

  if (dataReady) {
    renderAll();
  }

  // Fade out loading, show page
  const loadingEl = document.getElementById('loading');
  loadingEl.classList.add('fade-out');
  document.getElementById('page').style.display = 'flex';
  // Trigger resize after layout
  requestAnimationFrame(() => {
    onResize();
    setTimeout(() => {
      loadingEl.style.display = 'none';
    }, 800);
  });

  // Handle data load failure
  if (!dataReady) {
    console.warn('Data failed to load, retrying in 5s...');
    setTimeout(async () => {
      const ok = await loadData();
      if (ok) renderAll();
    }, 5000);
  }

  // Auto-reload data every 60 seconds
  setInterval(async () => {
    await loadData();
    renderAll();
  }, 60000);
}

init();
</script>
